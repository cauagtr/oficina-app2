<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Oficina — Mecânico</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy:   #111827;
  --amber:  #f59e0b;
  --amber2: #fbbf24;
  --green:  #10b981;
  --red:    #ef4444;
  --blue:   #3b82f6;
  --orange: #f97316;
  --bg:     #f8f9fa;
  --card:   #ffffff;
  --border: #e5e7eb;
  --text:   #111827;
  --muted:  #6b7280;
  --radius: 0.8rem;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
.hidden { display: none !important; }
#auth-screen {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  background: var(--navy); z-index: 1000;
  background-image: radial-gradient(ellipse at 20% 80%, rgba(245,158,11,.18) 0%, transparent 50%);
}
.auth-card { width: calc(100% - 2rem); max-width: 360px; background: rgba(255,255,255,.06); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,.1); border-radius: 1.5rem; padding: 2rem; }
.auth-title { font-size: 1.7rem; font-weight: 800; color: #fff; letter-spacing: -.03em; }
.auth-title span { color: var(--amber); }
.auth-sub { color: rgba(255,255,255,.4); font-size: .82rem; margin-top: .25rem; margin-bottom: 1.75rem; }
.auth-label { display: block; color: rgba(255,255,255,.55); font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; margin-top: 1rem; }
.auth-input { width: 100%; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.14); border-radius: .7rem; padding: .82rem 1rem; color: #fff; font-size: .95rem; outline: none; transition: .2s; font-family: inherit; }
.auth-input:focus { border-color: var(--amber); background: rgba(245,158,11,.08); }
.btn-login { width: 100%; margin-top: 1.5rem; padding: .9rem; background: var(--amber); border: none; border-radius: .7rem; color: var(--navy); font-weight: 800; font-size: .95rem; cursor: pointer; font-family: inherit; transition: .2s; }
.btn-login:active { transform: scale(.98); }
.auth-error { color: #fca5a5; font-size: .78rem; margin-top: .65rem; text-align: center; min-height: 1.1rem; }
#app { position: fixed; inset: 0; display: flex; flex-direction: column; }
.topbar { background: var(--navy); color: #fff; padding: .75rem 1rem; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; min-height: 54px; gap: .6rem; }
.topbar-left { display: flex; align-items: center; gap: .55rem; min-width: 0; }
.topbar-title { font-size: .95rem; font-weight: 800; letter-spacing: -.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.topbar-sub   { font-size: .67rem; color: rgba(255,255,255,.45); margin-top: .05rem; }
.topbar-right { display: flex; align-items: center; gap: .4rem; flex-shrink: 0; }
.btn-back { background: rgba(255,255,255,.1); border: none; color: #fff; width: 34px; height: 34px; border-radius: .5rem; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.btn-topo { background: rgba(255,255,255,.1); border: none; color: #fff; padding: .35rem .7rem; border-radius: .5rem; cursor: pointer; font-size: .75rem; font-weight: 700; font-family: inherit; white-space: nowrap; }
.page-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 72px; }
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(3, 1fr); z-index: 100; padding-bottom: env(safe-area-inset-bottom, 0); }
.nav-tab { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: .55rem .25rem; cursor: pointer; border: none; background: none; min-height: 54px; position: relative; font-family: inherit; }
.nav-icon  { font-size: 1.2rem; line-height: 1; }
.nav-label { font-size: .6rem; font-weight: 700; color: var(--muted); margin-top: .2rem; letter-spacing: .02em; text-transform: uppercase; }
.nav-tab.active .nav-label { color: var(--amber); }
.nav-badge { position: absolute; top: 5px; right: calc(50% - 18px); background: var(--red); color: #fff; border-radius: 999px; font-size: .58rem; font-weight: 800; padding: .1rem .32rem; min-width: .9rem; text-align: center; }
.card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); }
.card-pad { padding: 1rem; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: .4rem; padding: .65rem 1.1rem; border-radius: .6rem; border: none; font-size: .88rem; font-weight: 700; cursor: pointer; font-family: inherit; text-decoration: none; transition: .15s; }
.btn:active { transform: scale(.97); }
.btn-primary   { background: var(--amber); color: var(--navy); }
.btn-secondary { background: var(--bg); color: var(--text); border: 1.5px solid var(--border); }
.btn-success   { background: #d1fae5; color: #065f46; }
.btn-blue      { background: #dbeafe; color: #1d4ed8; }
.btn-purple    { background: #ede9fe; color: #5b21b6; }
.btn-whatsapp  { background: #25d366; color: #fff; }
.btn-full { width: 100%; display: flex; }
.btn-lg   { padding: .85rem 1.5rem; font-size: .95rem; border-radius: .7rem; }
.btn-sm   { padding: .38rem .75rem; font-size: .78rem; }
.badge { display: inline-flex; align-items: center; padding: .22rem .6rem; border-radius: 999px; font-size: .7rem; font-weight: 700; line-height: 1; white-space: nowrap; }
.b-nafila    { background: #f1f5f9; color: #475569; }
.b-manut     { background: #dbeafe; color: #1d4ed8; }
.b-aguard    { background: #ffedd5; color: #c2410c; }
.b-pronto    { background: #d1fae5; color: #065f46; }
.b-pago      { background: #064e3b; color: #a7f3d0; }
.b-cancelado { background: #fee2e2; color: #b91c1c; }
.b-servico   { background: #ffedd5; color: #c2410c; }
.b-peca      { background: #dbeafe; color: #1d4ed8; }
.form-group { margin-bottom: .85rem; }
.form-group label { display: block; font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: .38rem; }
.form-group label.req::after { content: ' *'; color: var(--red); }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: .72rem .9rem; border: 1.5px solid var(--border); border-radius: .6rem; font-size: .95rem; font-family: inherit; color: var(--text); background: #fff; outline: none; transition: .2s; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--amber); box-shadow: 0 0 0 3px rgba(245,158,11,.1); }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: .7rem; }
.form-section { font-size: .75rem; font-weight: 800; color: var(--navy); margin: 1rem 0 .65rem; padding-bottom: .3rem; border-bottom: 2px solid var(--amber); text-transform: uppercase; letter-spacing: .06em; }
.steps { display: flex; align-items: center; justify-content: center; gap: .3rem; padding: .8rem 1rem .3rem; }
.step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: .3s; }
.step-dot.active { background: var(--amber); width: 24px; border-radius: 4px; }
.step-dot.done   { background: var(--green); }
.step-label { font-size: .72rem; color: var(--muted); text-align: center; padding: 0 1rem .5rem; font-weight: 500; }
.check-item { display: flex; align-items: center; justify-content: space-between; padding: .82rem 1rem; border: 1.5px solid var(--border); border-radius: .65rem; margin-bottom: .45rem; background: #fff; }
.check-item.ok      { border-color: var(--green); background: #f0fdf4; }
.check-item.atencao { border-color: var(--amber); background: #fffbeb; }
.check-item.critico { border-color: var(--red);   background: #fff1f2; }
.check-label { font-size: .9rem; font-weight: 600; flex: 1; }
.check-btns  { display: flex; gap: .3rem; flex-shrink: 0; }
.check-btn { padding: .32rem .52rem; border-radius: .4rem; border: 1.5px solid var(--border); background: #fff; font-size: .72rem; cursor: pointer; font-weight: 700; font-family: inherit; }
.check-btn.ok      { background: #d1fae5; border-color: var(--green); color: #065f46; }
.check-btn.atencao { background: #fef3c7; border-color: var(--amber); color: #92400e; }
.check-btn.critico { background: #fee2e2; border-color: var(--red);   color: #b91c1c; }
.os-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 1rem; margin-bottom: .7rem; cursor: pointer; }
.os-card:active { background: #fafafa; }
.os-num   { font-size: .95rem; font-weight: 800; letter-spacing: -.02em; }
.os-footer { display: flex; align-items: center; justify-content: space-between; margin-top: .7rem; padding-top: .7rem; border-top: 1px solid var(--border); }
.os-valor  { font-size: 1rem; font-weight: 800; color: var(--green); }
.search-wrap { padding: .85rem 1rem; background: var(--navy); }
.search-box  { display: flex; align-items: center; gap: .6rem; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.14); border-radius: .75rem; padding: .62rem .85rem; }
.search-box input { flex: 1; background: none; border: none; outline: none; color: #fff; font-size: .95rem; font-family: inherit; }
.search-box input::placeholder { color: rgba(255,255,255,.38); }
.result-card  { background: var(--card); border-radius: var(--radius); border: 2px solid var(--amber); padding: 1rem; margin: 1rem; }
.veic-option  { display: flex; align-items: center; justify-content: space-between; padding: .62rem .85rem; border: 1.5px solid var(--border); border-radius: .6rem; margin-bottom: .4rem; cursor: pointer; background: #fff; }
.veic-option:active { background: var(--bg); }
.total-row     { display: flex; justify-content: space-between; align-items: center; padding: .45rem 0; font-size: .88rem; }
.total-destaque { font-size: 1.1rem; font-weight: 800; color: var(--green); padding-top: .7rem; border-top: 2px solid var(--border); margin-top: .2rem; }
.alert { padding: .75rem 1rem; border-radius: .6rem; font-size: .82rem; margin: .7rem 0; border-left: 3px solid; }
.alert-warning { background: #fffbeb; color: #92400e; border-color: var(--amber); }
.alert-danger  { background: #fff1f2; color: #b91c1c;  border-color: var(--red); }
.alert-success { background: #f0fdf4; color: #065f46;  border-color: var(--green); }
.alert-info    { background: #eff6ff; color: #1d4ed8;  border-color: var(--blue); }
#toast { position: fixed; bottom: 74px; left: 1rem; right: 1rem; padding: .82rem 1.1rem; border-radius: .75rem; font-size: .88rem; font-weight: 700; z-index: 9999; box-shadow: 0 4px 20px rgba(0,0,0,.18); }
#toast.success { background: #0f172a; color: #a7f3d0; border-left: 3px solid var(--green); }
#toast.error   { background: #0f172a; color: #fca5a5; border-left: 3px solid var(--red); }
#toast.info    { background: #0f172a; color: #bfdbfe; border-left: 3px solid var(--blue); }
#modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 500; display: flex; align-items: flex-end; }
.modal-sheet { background: var(--card); border-radius: 1.25rem 1.25rem 0 0; width: 100%; max-height: 92vh; overflow-y: auto; padding-bottom: 1.5rem; }
.modal-handle { width: 38px; height: 4px; background: var(--border); border-radius: 2px; margin: .7rem auto .2rem; }
.modal-header { padding: .7rem 1.25rem 0; display: flex; align-items: center; justify-content: space-between; }
.modal-title  { font-size: .95rem; font-weight: 800; letter-spacing: -.02em; }
.modal-close  { background: none; border: none; font-size: 1.3rem; color: var(--muted); cursor: pointer; }
.modal-body   { padding: 1rem 1.25rem; }
.modal-footer { padding: .75rem 1.25rem 0; display: flex; flex-direction: column; gap: .5rem; }
.empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); }
.empty-icon  { font-size: 2.8rem; margin-bottom: .7rem; }
.produto-row { display: flex; align-items: center; justify-content: space-between; padding: .85rem 1rem; border-bottom: 1px solid var(--border); }
.item-os-row { padding: .65rem .85rem; border: 1.5px solid var(--border); border-radius: .6rem; margin-bottom: .4rem; }
.item-os-row.servico { background: #fff7ed; border-color: #fed7aa; }
.item-os-row.peca    { background: #eff6ff; border-color: #bfdbfe; }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-title">Oficina <span>Mecânico</span></div>
    <div class="auth-sub">Acesso para equipe</div>
    <label class="auth-label">E-mail</label>
    <input class="auth-input" type="email" id="auth-email" placeholder="seu@email.com" autocomplete="email" onkeydown="if(event.key==='Enter')doLogin()">
    <label class="auth-label">Senha</label>
    <input class="auth-input" type="password" id="auth-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-login" id="btn-login" onclick="doLogin()">Entrar</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <div class="topbar-left">
      <button class="btn-back hidden" id="btn-back" onclick="voltar()">&#8592;</button>
      <div style="min-width:0">
        <div class="topbar-title" id="topbar-title">Oficina</div>
        <div class="topbar-sub"   id="topbar-sub">Mecânico</div>
      </div>
    </div>
    <div class="topbar-right" id="topbar-right">
      <button class="btn-topo" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <div class="page-scroll" id="page-content">
    <div class="empty-state"><div class="empty-icon">&#8987;</div></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-tab active" data-tab="buscar" onclick="App.go('buscar')">
      <span class="nav-icon">&#9711;</span><span class="nav-label">Buscar</span>
    </button>
    <button class="nav-tab" data-tab="minhas-os" onclick="App.go('minhas-os')">
      <span class="nav-icon">&#8942;</span><span class="nav-label">Minhas OS</span>
      <span class="nav-badge hidden" id="badge-os">0</span>
    </button>
    <button class="nav-tab" data-tab="estoque" onclick="App.go('estoque')">
      <span class="nav-icon">&#9635;</span><span class="nav-label">Estoque</span>
    </button>
  </nav>
</div>

<div id="modal-overlay" class="hidden" onclick="fecharModalFora(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modal-title">&#8212;</div>
      <button class="modal-close" onclick="fecharModal()">&#10005;</button>
    </div>
    <div class="modal-body"   id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div id="toast" class="hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
var SUPA_URL = 'https://phmtiulbrlnwjllcrjcf.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBobXRpdWxicmxud2psbGNyamNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjgwODksImV4cCI6MjA5MDU0NDA4OX0.vsM7EZckDErY4rGLM-BTfmthW4ern9sT1TnIN6FT4ss';
var APP3_URL = 'https://oficina-app3.vercel.app';

var _sb = null;
function sb() { if (!_sb) _sb = supabase.createClient(SUPA_URL, SUPA_KEY); return _sb; }

function brl(v) { return 'R$\u00a0' + Math.abs(Number(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2}); }
function hoje() { return new Date().toISOString().substring(0,10); }
function dataBR(iso) { if(!iso) return '\u2014'; var p=iso.substring(0,10).split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function maskCPF(v)   { return v.replace(/\D/g,'').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2'); }
function maskPhone(v) { return v.replace(/\D/g,'').replace(/(\d{2})(\d)/,'($1) $2').replace(/(\d{5})(\d)/,'$1-$2'); }
function numOS() { var n=new Date(); return n.getFullYear()+''+(n.getMonth()+1).toString().padStart(2,'0')+'-'+(Math.floor(Math.random()*9000)+1000); }
function esc(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

var SL = {'na_fila':'Na Fila','em_manutencao':'Em Manut.','aguardando_peca':'Aguard. Peca','pronto_retirada':'Pronto','pago':'Pago','cancelado':'Cancelado'};
var SC = {'na_fila':'b-nafila','em_manutencao':'b-manut','aguardando_peca':'b-aguard','pronto_retirada':'b-pronto','pago':'b-pago','cancelado':'b-cancelado'};
function badgeOS(s) { return '<span class="badge '+(SC[s]||'b-nafila')+'">'+(SL[s]||s)+'</span>'; }

var _tTimer;
function toast(msg, tipo) {
  tipo = tipo||'success';
  var el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast '+tipo;
  el.classList.remove('hidden');
  clearTimeout(_tTimer);
  _tTimer = setTimeout(function(){ el.classList.add('hidden'); }, 3500);
}

function abrirModal(titulo, corpo, rodape) {
  document.getElementById('modal-title').textContent = titulo||'';
  document.getElementById('modal-body').innerHTML    = corpo||'';
  document.getElementById('modal-footer').innerHTML  = rodape||'';
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function fecharModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
function fecharModalFora(e) { if(e.target.id==='modal-overlay') fecharModal(); }

var _user = null, _funcId = null;

function doLogin() {
  var email=document.getElementById('auth-email').value.trim();
  var pass =document.getElementById('auth-pass').value;
  var errEl=document.getElementById('auth-error');
  var btn  =document.getElementById('btn-login');
  errEl.textContent='';
  if(!email||!pass){ errEl.textContent='Preencha e-mail e senha.'; return; }
  btn.textContent='Entrando...'; btn.disabled=true;
  sb().auth.signInWithPassword({email:email,password:pass}).then(function(res){
    btn.textContent='Entrar'; btn.disabled=false;
    if(res.error) errEl.textContent='E-mail ou senha incorretos.';
  });
}
function doLogout() { sb().auth.signOut(); }

sb().auth.onAuthStateChange(function(event, session){
  if(session){
    _user=session.user;
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    sb().from('funcionarios').select('id,nome').eq('email',session.user.email).maybeSingle().then(function(res){
      _funcId=res.data?res.data.id:null;
      App.init();
    });
  } else {
    _user=null; _funcId=null;
    document.getElementById('auth-screen').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
  }
});

function atualizarBadge() {
  sb().from('ordens_servico').select('id').in('status',['na_fila','em_manutencao','aguardando_peca','pronto_retirada']).then(function(res){
    var n=res.data?res.data.length:0;
    var el=document.getElementById('badge-os');
    if(el){ el.textContent=n; el.classList.toggle('hidden',n===0); }
  });
}

document.addEventListener('visibilitychange', function(){
  if(document.visibilityState==='hidden') sessionStorage.setItem('app2_pag', App.atual);
});

var App = {
  atual: 'buscar',
  _params: {},
  go: function(pag, params){
    this.atual=pag; this._params=params||{};
    sessionStorage.setItem('app2_pag',pag);
    document.querySelectorAll('.nav-tab').forEach(function(t){ t.classList.toggle('active',t.dataset.tab===pag); });
    var comVoltar=['nova-os','nova-os-2','nova-os-3','nova-os-4','detalhe-os','cadastro-cliente'];
    document.getElementById('btn-back').classList.toggle('hidden', comVoltar.indexOf(pag)<0);
    var el=document.getElementById('page-content'); el.scrollTop=0;
    if     (pag==='buscar')           pgBuscar(el);
    else if(pag==='minhas-os')        pgMinhasOS(el);
    else if(pag==='estoque')          pgEstoque(el);
    else if(pag==='detalhe-os')       pgDetalhOS(el,this._params.osId);
    else if(pag==='nova-os')          pgNovaOS1(el);
    else if(pag==='nova-os-2')        pgNovaOS2(el);
    else if(pag==='nova-os-3')        pgNovaOS3(el);
    else if(pag==='nova-os-4')        pgNovaOS4(el);
    else if(pag==='cadastro-cliente') pgCadastroCliente(el);
  },
  init: function(){
    atualizarBadge();
    var saved=sessionStorage.getItem('app2_pag');
    var ok=['buscar','minhas-os','estoque'];
    this.go(saved&&ok.indexOf(saved)>=0?saved:'buscar');
  }
};

function voltar(){
  var mapa={'nova-os':'buscar','nova-os-2':'nova-os','nova-os-3':'nova-os-2','nova-os-4':'nova-os-3','detalhe-os':'minhas-os','cadastro-cliente':'buscar'};
  App.go(mapa[App.atual]||'buscar');
}
function setTopbar(titulo, sub, acoes){
  document.getElementById('topbar-title').textContent=titulo||'';
  document.getElementById('topbar-sub').textContent=sub||'';
  document.getElementById('topbar-right').innerHTML=acoes||'<button class="btn-topo" onclick="doLogout()">Sair</button>';

function mudarStatus(osId,novoStatus){ sb().from('ordens_servico').update({status:novoStatus}).eq('id',osId).then(function(res){ if(res.error){ toast('Erro: '+res.error.message,'error'); return; } toast('Status: '+(SL[novoStatus]||novoStatus)); atualizarBadge(); pgDetalhOS(document.getElementById('page-content'),osId); }); }

function abrirChecklistSaida(osId){ var itens=['Motor ligado OK','Freios OK','Luzes OK','Servico concluido OK','Limpeza do veiculo','Documentos devolvidos']; window._csOk={}; var html='<div style="font-size:.82rem;color:var(--muted);margin-bottom:1rem">Confirme todos os itens.</div>'; html+=itens.map(function(it){ var id=it.replace(/\s/g,'_'); return '<div style="display:flex;align-items:center;justify-content:space-between;padding:.72rem;border:1.5px solid var(--border);border-radius:.6rem;margin-bottom:.4rem" id="cs-'+id+'"><span style="font-weight:600;font-size:.88rem">'+it+'</span><button onclick="toggleCS(\''+id+'\',\''+it+'\')" id="csb-'+id+'" style="padding:.35rem .7rem;border:1.5px solid var(--border);border-radius:.5rem;background:#fff;cursor:pointer;font-size:.78rem;font-weight:700;font-family:inherit">Pendente</button></div>'; }).join(''); abrirModal('Checklist de Saida',html,'<button class="btn btn-secondary btn-full" onclick="fecharModal()">Cancelar</button><button class="btn btn-success btn-full" onclick="confirmarConclusao(\''+osId+'\')">Confirmar Conclusao</button>'); }
function toggleCS(id,nome){ var btn=document.getElementById('csb-'+id); var card=document.getElementById('cs-'+id); if(window._csOk[nome]){ delete window._csOk[nome]; btn.textContent='Pendente'; btn.style.background='#fff'; btn.style.borderColor='var(--border)'; btn.style.color='inherit'; card.style.borderColor='var(--border)'; card.style.background='#fff'; } else { window._csOk[nome]=true; btn.textContent='OK'; btn.style.background='#d1fae5'; btn.style.borderColor='#10b981'; btn.style.color='#065f46'; card.style.borderColor='#10b981'; card.style.background='#f0fdf4'; } }
function confirmarConclusao(osId){ var itens=['Motor ligado OK','Freios OK','Luzes OK','Servico concluido OK','Limpeza do veiculo','Documentos devolvidos']; var pend=itens.filter(function(i){ return !window._csOk[i]; }); if(pend.length>0){ toast('Confirme todos os itens ('+pend.length+' pendentes)','error'); return; } sb().from('ordens_servico').update({status:'pronto_retirada',checklist_saida:window._csOk,data_conclusao:new Date().toISOString()}).eq('id',osId).then(function(res){ if(res.error){ toast('Erro: '+res.error.message,'error'); return; } toast('OS pronta para retirada!'); fecharModal(); atualizarBadge(); pgDetalhOS(document.getElementById('page-content'),osId); }); }

function fecharOS(osId,valorOriginal){ var formaPag=document.getElementById('forma-pag').value; var descExtra=parseFloat(document.getElementById('desc-extra').value)||0; var valorFinal=Math.max(0,Number(valorOriginal)-descExtra); sb().from('ordens_servico').update({status:'pago',forma_pagamento:formaPag,data_pagamento:new Date().toISOString(),valor_total:valorFinal}).eq('id',osId).select().single().then(function(res){ if(res.error){ toast('Erro: '+res.error.message,'error'); return; } var os=res.data; sb().from('financeiro_entradas').insert({os_id:osId,descricao:'OS '+(os?os.numero:osId),valor:valorFinal,forma_pagamento:formaPag,data_recebimento:hoje(),status:'recebido',categoria:'Servico'}).then(function(){ toast('OS fechada e pagamento registrado!'); atualizarBadge(); pgDetalhOS(document.getElementById('page-content'),osId); }); }); }

function avaliarOS(osId,nota){ abrirModal('Avaliacao do Servico','<div style="text-align:center;font-size:2rem;margin-bottom:.75rem">'+'&#9733;'.repeat(nota)+'</div><div class="form-group"><label style="display:block;font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.38rem">Comentario (opcional)</label><textarea id="av-coment" placeholder="Como foi o atendimento?" style="width:100%;padding:.72rem .9rem;border:1.5px solid var(--border);border-radius:.6rem;font-size:.95rem;font-family:inherit;min-height:75px;resize:vertical"></textarea></div>','<button class="btn btn-secondary btn-full" onclick="fecharModal()">Pular</button><button class="btn btn-primary btn-full" onclick="confirmarAvaliacao(\''+osId+'\','+nota+')">Enviar</button>'); }
function confirmarAvaliacao(osId,nota){ var coment=document.getElementById('av-coment')?document.getElementById('av-coment').value.trim():''; sb().from('ordens_servico').update({avaliacao:nota,comentario_avaliacao:coment}).eq('id',osId).then(function(){ toast('Avaliacao enviada!'); fecharModal(); pgDetalhOS(document.getElementById('page-content'),osId); }); }

function gerarPDF(osId){
  Promise.all([sb().from('ordens_servico').select('*,clientes(*),veiculos(*)').eq('id',osId).single(),sb().from('os_itens').select('*').eq('os_id',osId)]).then(function(results){
    var os=results[0].data; if(!os) return; var itens=results[1].data||[];

    doc.setFontSize(14); doc.setFont('helvetica','bold'); doc.setTextColor(245,158,11);

    doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(200,200,200);
    doc.text('OS: '+os.numero,14,16); doc.text('Data: '+dataBR(os.data_pagamento||os.created_at),196,16,{align:'right'});
    doc.setTextColor(0,0,0); var y=32;

    doc.text('KM: '+(os.quilometragem_entrada||'--'),110,y+14);
    y+=28;
    if(os.descricao){ doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.text('SERVICO SOLICITADO:',14,y); y+=5; doc.setFont('helvetica','normal'); doc.setFontSize(8); var lines=doc.splitTextToSize(os.descricao,180); doc.text(lines,14,y); y+=lines.length*4+6; }
    doc.setFillColor(17,24,39); doc.rect(10,y,190,7,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(255,255,255);
    doc.text('TIPO',14,y+5); doc.text('DESCRICAO',38,y+5); doc.text('QTD',140,y+5); doc.text('UNIT.',155,y+5); doc.text('TOTAL',192,y+5,{align:'right'});
    y+=10; doc.setTextColor(0,0,0);
    itens.forEach(function(it,i){ if(i%2===1){ doc.setFillColor(248,249,250); doc.rect(10,y-4,190,8,'F'); } doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.text(it.tipo==='servico'?'Servico':'Peca',14,y); doc.setFont('helvetica','normal'); doc.text(it.descricao,38,y); doc.text(String(it.quantidade),140,y); doc.text(brl(it.valor_unitario),155,y); doc.text(brl(it.valor_total),196,y,{align:'right'}); y+=8; if(y>260){ doc.addPage(); y=20; } });
    y+=4; doc.setFont('helvetica','normal'); doc.setFontSize(8.5);
    doc.text('Servicos: '+brl(os.valor_servicos),140,y,{align:'right'}); y+=6; doc.text('Pecas: '+brl(os.valor_pecas),140,y,{align:'right'});
    if(os.desconto>0){ y+=6; doc.text('Desconto: -'+brl(os.desconto),140,y,{align:'right'}); }
    y+=8; doc.setFillColor(17,24,39); doc.rect(130,y-5,70,9,'F'); doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(245,158,11);
    doc.text('TOTAL: '+brl(os.valor_total),196,y+1,{align:'right'}); doc.setTextColor(0,0,0); y+=14;
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.text('Pagamento: '+(os.forma_pagamento||'--'),14,y); y+=14;

    doc.save('recibo-'+os.numero+'.pdf'); toast('PDF gerado!');
  });
}

function carregarEstoque(){ sb().from('estoque').select('id,nome,categoria,quantidade,quantidade_minima,unidade').order('nome').then(function(res){ var lista=res.data||[]; var el=document.getElementById('est-lista'); if(!el) return; var filtrada=_estSearch?lista.filter(function(p){ return (p.nome||'').toLowerCase().includes(_estSearch)||(p.categoria||'').toLowerCase().includes(_estSearch); }):lista; var alertas=filtrada.filter(function(p){ return Number(p.quantidade)<=Number(p.quantidade_minima); }); var html=''; if(alertas.length) html+='<div class="alert alert-danger" style="margin:.75rem">'+alertas.length+' iten(s) abaixo do minimo</div>'; if(!filtrada.length){ html+='<div class="empty-state"><div class="empty-icon">&#9635;</div><p style="font-size:.85rem">Nenhum produto</p></div>'; } else { html+=filtrada.map(function(p){ var ok=Number(p.quantidade)>Number(p.quantidade_minima); var warn=Number(p.quantidade)===Number(p.quantidade_minima); var cor=ok?'var(--green)':warn?'var(--amber)':'var(--red)'; return '<div class="produto-row"><div><div style="font-weight:700;font-size:.9rem">'+p.nome+'</div><div style="font-size:.73rem;color:var(--muted)">'+(p.categoria||'&mdash;')+'</div></div><div style="text-align:right"><div style="font-size:1rem;font-weight:800;color:'+cor+'">'+p.quantidade+' '+(p.unidade||'un')+'</div><div style="font-size:.7rem;color:var(--muted)">min: '+p.quantidade_minima+'</div></div></div>'; }).join(''); } el.innerHTML=html; }); }

function abrirEntradaEstoque(){ sb().from('estoque').select('id,nome,quantidade').order('nome').then(function(res){ var prods=res.data||[]; abrirModal('Entrada de Estoque','<div class="form-group"><label style="display:block;font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.38rem">Produto *</label><input type="text" id="ee-busca" placeholder="Digite para buscar..." list="ee-prod-list" oninput="filtrarProdEntrada(this.value)" style="width:100%;padding:.72rem .9rem;border:1.5px solid var(--border);border-radius:.6rem;font-size:.95rem;font-family:inherit;outline:none;margin-bottom:.4rem"><datalist id="ee-prod-list">'+prods.map(function(p){ return '<option value="'+esc(p.nome)+'" data-id="'+p.id+'">'+p.nome+'</option>'; }).join('')+'</datalist><input type="hidden" id="ee-prod"><select id="ee-prod-sel" style="width:100%;padding:.65rem;border:1.5px solid var(--border);border-radius:.6rem;font-size:.9rem;font-family:inherit" onchange="selecionarProdEntrada(this)"><option value="">-- ou selecione da lista --</option>'+prods.map(function(p){ return '<option value="'+p.id+'" data-nome="'+esc(p.nome)+'">'+p.nome+' (atual: '+p.quantidade+')</option>'; }).join('')+'</select></div><div class="form-2col"><div class="form-group"><label style="display:block;font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.38rem">Quantidade *</label><input type="number" id="ee-qtd" value="1" min="0.01" step="0.01" inputmode="decimal" style="width:100%;padding:.72rem .9rem;border:1.5px solid var(--border);border-radius:.6rem;font-size:.95rem;font-family:inherit;outline:none"></div><div class="form-group"><label style="display:block;font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.38rem">Custo Unit. R$ *</label><input type="number" id="ee-custo" value="0" step="0.01" inputmode="decimal" style="width:100%;padding:.72rem .9rem;border:1.5px solid var(--border);border-radius:.6rem;font-size:.95rem;font-family:inherit;outline:none"></div></div><div class="form-group"><label style="display:block;font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.38rem">Nota Fiscal (foto ou PDF)</label><input type="file" id="ee-nf" accept="image/*,application/pdf" style="width:100%;padding:.5rem;border:1.5px dashed var(--border);border-radius:.6rem;font-size:.85rem;font-family:inherit;background:#fafafa"><div style="font-size:.68rem;color:var(--muted);margin-top:.25rem">JPG, PNG ou PDF · max 5MB</div></div><div class="form-group"><label style="display:block;font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.38rem">Observacao</label><input type="text" id="ee-obs" placeholder="Fornecedor, numero da NF..." style="width:100%;padding:.72rem .9rem;border:1.5px solid var(--border);border-radius:.6rem;font-size:.95rem;font-family:inherit;outline:none"></div>','<button class="btn btn-secondary btn-full" onclick="fecharModal()">Cancelar</button><button class="btn btn-primary btn-full" onclick="confirmarEntrada()">Registrar Entrada</button>'); }); }
function filtrarProdEntrada(val){ var dl=document.getElementById('ee-prod-list'); if(!dl) return; var opts=[].slice.call(dl.options); var opt=opts.find(function(o){ return o.value.toLowerCase().startsWith(val.toLowerCase()); }); var hidden=document.getElementById('ee-prod'); if(opt&&hidden) hidden.value=opt.dataset.id||''; }
function selecionarProdEntrada(sel){ var hidden=document.getElementById('ee-prod'); var busca=document.getElementById('ee-busca'); if(hidden) hidden.value=sel.value; if(busca) busca.value=sel.options[sel.selectedIndex].dataset.nome||''; }
function confirmarEntrada(){
  var prodId=document.getElementById('ee-prod').value;
  var qtd=parseFloat(document.getElementById('ee-qtd').value)||0;
  var custo=parseFloat(document.getElementById('ee-custo').value)||0;
  var obs=document.getElementById('ee-obs').value;
  var nfInput=document.getElementById('ee-nf');
  if(!prodId){ toast('Selecione o produto','error'); return; }
  if(qtd<=0){ toast('Informe a quantidade','error'); return; }
  if(!custo){ toast('Custo unitario e obrigatorio','error'); return; }

  function salvar(nfBase64,nfNome,nfTipo){
    sb().from('estoque').select('quantidade,nome').eq('id',prodId).single().then(function(res){
      var nova=(Number(res.data?res.data.quantidade:0)||0)+qtd;
      var nomeProd=res.data?res.data.nome:null;
      Promise.all([
        sb().from('estoque').update({quantidade:nova,valor_custo:custo}).eq('id',prodId),
        sb().from('estoque_movimentos').insert({
          produto_id:prodId,tipo:'entrada',quantidade:qtd,
          valor_unitario:custo,observacoes:obs,
          data_movimento:new Date().toISOString().substring(0,10),
          nf_base64:nfBase64||null,
          nf_nome:nfNome||null,
          nf_tipo:nfTipo||null,
          produto_nome:nomeProd||null
        })
      ]).then(function(){
        toast('Entrada registrada! Total: '+nova);
        fecharModal(); carregarEstoque();
      });
    });
  }

  if(nfInput&&nfInput.files&&nfInput.files[0]){
    var file=nfInput.files[0];
    if(file.size>5*1024*1024){ toast('Arquivo maior que 5MB','error'); return; }
    var reader=new FileReader();
    reader.onload=function(e){ salvar(e.target.result.split(',')[1],file.name,file.type); };
    reader.readAsDataURL(file);
  } else {
    salvar(null,null,null);
  }
}

// CADASTRO CLIENTE
function pgCadastroCliente(el){
  setTopbar('Novo Cliente','Cadastro rapido');
  el.innerHTML='<div style="padding:1rem"><div class="form-group"><label class="req">Nome Completo</label><input type="text" id="nc-nome" autocomplete="name"></div><div class="form-2col"><div class="form-group"><label class="req">CPF</label><input type="text" id="nc-cpf" placeholder="000.000.000-00" inputmode="numeric" maxlength="14"></div><div class="form-group"><label class="req">Telefone</label><input type="tel" id="nc-tel" placeholder="(00) 00000-0000" maxlength="15"></div></div><div class="form-group"><label class="req">E-mail</label><input type="email" id="nc-email"></div><div class="form-section">Veiculo</div><div class="form-group"><label class="req">Placa</label><input type="text" id="nv-placa" placeholder="ABC-1234" style="text-transform:uppercase"></div><div class="form-2col"><div class="form-group"><label class="req">Marca</label><input type="text" id="nv-marca" placeholder="Toyota"></div><div class="form-group"><label class="req">Modelo</label><input type="text" id="nv-modelo" placeholder="Corolla"></div></div><div class="form-2col"><div class="form-group"><label class="req">Ano</label><input type="number" id="nv-ano" inputmode="numeric"></div><div class="form-group"><label class="req">Cor</label><input type="text" id="nv-cor"></div></div><div class="form-group"><label class="req">Combustivel</label><select id="nv-comb"><option value="">--</option>'+['Gasolina','Alcool','Flex','Diesel','GNV','Eletrico','Hibrido'].map(function(c){ return '<option>'+c+'</option>'; }).join('')+'</select></div><div class="form-group"><label>Quilometragem</label><input type="number" id="nv-km" inputmode="numeric"></div><button class="btn btn-primary btn-full btn-lg" id="btn-salvar-cli" onclick="salvarNovoCliente()">Cadastrar e Abrir OS</button><div style="height:.5rem"></div></div>';
  document.getElementById('nc-cpf').addEventListener('input',function(){ this.value=maskCPF(this.value); });
  document.getElementById('nc-tel').addEventListener('input',function(){ this.value=maskPhone(this.value); });
}

function salvarNovoCliente(){
  var nome=document.getElementById('nc-nome').value.trim(), cpf=document.getElementById('nc-cpf').value.trim(), tel=document.getElementById('nc-tel').value.trim(), email=document.getElementById('nc-email').value.trim(), placa=document.getElementById('nv-placa').value.toUpperCase().trim(), marca=document.getElementById('nv-marca').value.trim(), modelo=document.getElementById('nv-modelo').value.trim(), ano=parseInt(document.getElementById('nv-ano').value)||null, cor=document.getElementById('nv-cor').value.trim(), comb=document.getElementById('nv-comb').value;
  if(!nome){ toast('Nome obrigatorio','error'); return; } if(!cpf){ toast('CPF obrigatorio','error'); return; } if(!tel){ toast('Telefone obrigatorio','error'); return; } if(!email){ toast('Email obrigatorio','error'); return; } if(!placa){ toast('Placa obrigatoria','error'); return; } if(!marca){ toast('Marca obrigatoria','error'); return; } if(!modelo){ toast('Modelo obrigatorio','error'); return; } if(!ano){ toast('Ano obrigatorio','error'); return; } if(!cor){ toast('Cor obrigatoria','error'); return; } if(!comb){ toast('Combustivel obrigatorio','error'); return; }
  var btn=document.getElementById('btn-salvar-cli'); btn.textContent='Salvando...'; btn.disabled=true;
  sb().from('clientes').insert({nome:nome,cpf:cpf,telefone:tel,email:email,status:'novo'}).select().single().then(function(rc){ if(rc.error){ toast('Erro: '+rc.error.message,'error'); btn.textContent='Cadastrar e Abrir OS'; btn.disabled=false; return; } var cli=rc.data; sb().from('veiculos').insert({cliente_id:cli.id,placa:placa,marca:marca,modelo:modelo,ano:ano,cor:cor,combustivel:comb,quilometragem:parseInt(document.getElementById('nv-km').value)||null}).select().single().then(function(rv){ if(rv.error){ toast('Erro: '+rv.error.message,'error'); btn.textContent='Cadastrar e Abrir OS'; btn.disabled=false; return; } toast('Cliente e veiculo cadastrados!'); selecionarVeiculo(cli.id,cli.nome,tel,cpf,rv.data.id,placa,(marca+' '+modelo).trim()); }); });
}

function abrirAddVeiculo(cliId,cliNome){ abrirModal('Novo Veiculo - '+cliNome,'<div class="form-group"><label class="req">Placa</label><input type="text" id="fv-placa" placeholder="ABC-1234" style="text-transform:uppercase;width:100%;padding:.72rem .9rem;border:1.5px solid var(--border);border-radius:.6rem;font-size:.95rem;font-family:inherit;outline:none"></div><div class="form-2col"><div class="form-group"><label>Marca</label><input type="text" id="fv-marca" placeholder="Toyota" style="width:100%;padding:.72rem .9rem;border:1.5px solid var(--border);border-radius:.6rem;font-size:.95rem;font-family:inherit;outline:none"></div><div class="form-group"><label>Modelo</label><input type="text" id="fv-modelo" placeholder="Corolla" style="width:100%;padding:.72rem .9rem;border:1.5px solid var(--border);border-radius:.6rem;font-size:.95rem;font-family:inherit;outline:none"></div></div><div class="form-2col"><div class="form-group"><label>Ano</label><input type="number" id="fv-ano" style="width:100%;padding:.72rem .9rem;border:1.5px solid var(--border);border-radius:.6rem;font-size:.95rem;font-family:inherit;outline:none"></div><div class="form-group"><label>Cor</label><input type="text" id="fv-cor" style="width:100%;padding:.72rem .9rem;border:1.5px solid var(--border);border-radius:.6rem;font-size:.95rem;font-family:inherit;outline:none"></div></div><div class="form-group"><label>Combustivel</label><select id="fv-comb" style="width:100%;padding:.65rem;border:1.5px solid var(--border);border-radius:.6rem;font-size:.9rem;font-family:inherit"><option value="">--</option>'+['Gasolina','Alcool','Flex','Diesel','GNV','Eletrico','Hibrido'].map(function(c){ return '<option>'+c+'</option>'; }).join('')+'</select></div>','<button class="btn btn-secondary btn-full" onclick="fecharModal()">Cancelar</button><button class="btn btn-primary btn-full" onclick="salvarAddVeiculo(\''+esc(cliId)+'\',\''+esc(cliNome)+'\')">Salvar</button>'); }
function salvarAddVeiculo(cliId,cliNome){ var placa=document.getElementById('fv-placa').value.toUpperCase().trim(); if(!placa){ toast('Placa obrigatoria','error'); return; } sb().from('veiculos').insert({cliente_id:cliId,placa:placa,marca:document.getElementById('fv-marca').value.trim(),modelo:document.getElementById('fv-modelo').value.trim(),ano:parseInt(document.getElementById('fv-ano').value)||null,cor:document.getElementById('fv-cor').value.trim(),combustivel:document.getElementById('fv-comb').value||null}).select().single().then(function(rv){ if(rv.error){ toast('Erro: '+rv.error.message,'error'); return; } toast('Veiculo adicionado!'); fecharModal(); selecionarVeiculo(cliId,cliNome,'','',rv.data.id,placa,''); }); }
</script>

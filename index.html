<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Oficina — Mecânico</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#111827;--amber:#f59e0b;--amber2:#fbbf24;--green:#10b981;
  --red:#ef4444;--blue:#3b82f6;--bg:#f8f9fa;--card:#ffffff;
  --border:#e5e7eb;--text:#111827;--muted:#6b7280;--radius:0.75rem;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.hidden{display:none!important}
#auth-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--navy);z-index:1000;background-image:radial-gradient(ellipse at 20% 80%,rgba(245,158,11,.15) 0%,transparent 50%)}
.auth-card{width:calc(100% - 2rem);max-width:360px;background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:1.25rem;padding:2rem}
.auth-title{font-size:1.7rem;font-weight:800;color:#fff;letter-spacing:-.03em}
.auth-title span{color:var(--amber)}
.auth-sub{color:rgba(255,255,255,.4);font-size:.82rem;margin-top:.2rem;margin-bottom:1.75rem}
.auth-label{display:block;color:rgba(255,255,255,.55);font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem;margin-top:1rem}
.auth-input{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:.65rem;padding:.82rem 1rem;color:#fff;font-size:.95rem;outline:none;transition:.2s;font-family:inherit}
.auth-input:focus{border-color:var(--amber);background:rgba(245,158,11,.08)}
.btn-login{width:100%;margin-top:1.5rem;padding:.9rem;background:var(--amber);border:none;border-radius:.65rem;color:var(--navy);font-weight:700;font-size:.95rem;cursor:pointer;font-family:inherit;transition:.2s}
.btn-login:active{background:var(--amber2);transform:scale(.98)}
.auth-error{color:#fca5a5;font-size:.8rem;margin-top:.6rem;text-align:center;min-height:1.1rem}
#app{position:fixed;inset:0;display:flex;flex-direction:column}
.topbar{background:var(--navy);color:#fff;padding:.8rem 1rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;min-height:54px;gap:.5rem}
.topbar-left{display:flex;align-items:center;gap:.6rem;flex:1;min-width:0}
.topbar-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.btn-back{background:rgba(255,255,255,.1);border:none;color:#fff;width:34px;height:34px;border-radius:.5rem;cursor:pointer;font-size:1.05rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topbar-title{font-size:.95rem;font-weight:700;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-sub{font-size:.68rem;color:rgba(255,255,255,.45);margin-top:.05rem}
.btn-top{background:rgba(255,255,255,.1);border:none;color:#fff;padding:.38rem .75rem;border-radius:.5rem;cursor:pointer;font-size:.75rem;font-weight:600;font-family:inherit;white-space:nowrap}
.page-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:72px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1.5px solid var(--border);display:grid;grid-template-columns:repeat(3,1fr);z-index:100}
.nav-tab{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.55rem .25rem;cursor:pointer;border:none;background:none;min-height:54px;position:relative;font-family:inherit}
.nav-icon{font-size:1.15rem;line-height:1}
.nav-label{font-size:.62rem;font-weight:700;color:var(--muted);margin-top:.2rem}
.nav-tab.active .nav-label{color:var(--amber)}
.nav-badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--red);color:#fff;border-radius:999px;font-size:.58rem;font-weight:700;padding:.1rem .32rem;min-width:.95rem;text-align:center}
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border)}
.card-pad{padding:1rem}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.35rem;padding:.65rem 1.1rem;border-radius:.6rem;border:none;font-size:.88rem;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:none;transition:.15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--amber);color:var(--navy)}
.btn-secondary{background:var(--bg);color:var(--text);border:1.5px solid var(--border)}
.btn-success{background:#d1fae5;color:#065f46}
.btn-blue{background:#dbeafe;color:#1d4ed8}
.btn-purple{background:#ede9fe;color:#5b21b6}
.btn-whatsapp{background:#25d366;color:#fff}
.btn-full{width:100%;display:flex}
.btn-lg{padding:.85rem 1.4rem;font-size:.95rem;border-radius:.7rem}
.btn-sm{padding:.4rem .75rem;font-size:.78rem}
.badge{display:inline-flex;align-items:center;padding:.25rem .65rem;border-radius:999px;font-size:.68rem;font-weight:700;line-height:1;white-space:nowrap}
.b-nafila{background:#f1f5f9;color:#475569}
.b-manut{background:#dbeafe;color:#1d4ed8}
.b-aguard{background:#ffedd5;color:#c2410c}
.b-pronto{background:#d1fae5;color:#065f46}
.b-pago{background:#064e3b;color:#a7f3d0}
.b-cancelado{background:#fee2e2;color:#b91c1c}
.b-servico{background:#ffedd5;color:#c2410c}
.b-peca{background:#dbeafe;color:#1d4ed8}
.form-group{margin-bottom:.85rem}
.form-group label{display:block;font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.38rem}
.form-group label.req::after{content:' *';color:var(--red)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:.75rem .9rem;border:1.5px solid var(--border);border-radius:.6rem;font-size:.95rem;font-family:inherit;color:var(--text);background:#fff;outline:none;transition:.2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(245,158,11,.1)}
.form-group textarea{resize:vertical;min-height:80px}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.form-section{font-size:.72rem;font-weight:800;color:var(--navy);margin:1rem 0 .6rem;padding-bottom:.3rem;border-bottom:2px solid var(--amber);text-transform:uppercase;letter-spacing:.06em}
.steps{display:flex;align-items:center;justify-content:center;gap:.3rem;padding:.75rem 1rem .4rem}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:.3s}
.step-dot.active{background:var(--amber);width:22px;border-radius:4px}
.step-dot.done{background:var(--green)}
.step-label{font-size:.7rem;color:var(--muted);text-align:center;padding:0 1rem .6rem;font-weight:500}
.check-item{display:flex;align-items:center;justify-content:space-between;padding:.82rem 1rem;border:1.5px solid var(--border);border-radius:.6rem;margin-bottom:.45rem;background:#fff;transition:.2s}
.check-item.ok{border-color:var(--green);background:#f0fdf4}
.check-item.atencao{border-color:var(--amber);background:#fffbeb}
.check-item.critico{border-color:var(--red);background:#fff1f2}
.check-label{font-size:.88rem;font-weight:600;flex:1}
.check-btns{display:flex;gap:.3rem;flex-shrink:0}
.check-btn{padding:.3rem .5rem;border-radius:.4rem;border:1.5px solid var(--border);background:#fff;font-size:.72rem;cursor:pointer;font-weight:600;font-family:inherit}
.check-btn.ok{background:#d1fae5;border-color:#10b981;color:#065f46}
.check-btn.atencao{background:#fef3c7;border-color:#f59e0b;color:#92400e}
.check-btn.critico{background:#fee2e2;border-color:#ef4444;color:#b91c1c}
.os-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:1rem;margin-bottom:.7rem;cursor:pointer;transition:.15s}
.os-card:active{background:#fafafa;transform:scale(.99)}
.os-num{font-size:.92rem;font-weight:800;letter-spacing:-.02em}
.os-footer{display:flex;align-items:center;justify-content:space-between;margin-top:.7rem;padding-top:.7rem;border-top:1px solid var(--border)}
.os-valor{font-size:.95rem;font-weight:800;color:var(--green)}
.search-wrap{padding:.85rem 1rem;background:var(--navy)}
.search-box{display:flex;align-items:center;gap:.6rem;background:rgba(255,255,255,.09);border:1.5px solid rgba(255,255,255,.14);border-radius:.7rem;padding:.65rem .9rem}
.search-box input{flex:1;background:none;border:none;outline:none;color:#fff;font-size:.95rem;font-family:inherit}
.search-box input::placeholder{color:rgba(255,255,255,.38)}
.result-card{background:var(--card);border-radius:var(--radius);border:2px solid var(--amber);padding:1rem;margin:1rem}
.veic-option{display:flex;align-items:center;justify-content:space-between;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:.6rem;margin-bottom:.4rem;cursor:pointer;background:#fff;transition:.15s}
.veic-option:active{background:var(--bg)}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:.45rem 0;font-size:.88rem}
.total-destaque{font-size:1.05rem;font-weight:800;color:var(--green);padding-top:.65rem;border-top:2px solid var(--border);margin-top:.25rem}
.produto-row{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1rem;border-bottom:1px solid var(--border)}
.alert{padding:.8rem 1rem;border-radius:.6rem;font-size:.82rem;margin:.6rem 0;border-left:3px solid}
.alert-warning{background:#fffbeb;color:#92400e;border-color:var(--amber)}
.alert-danger{background:#fff1f2;color:#b91c1c;border-color:var(--red)}
.alert-success{background:#f0fdf4;color:#065f46;border-color:var(--green)}
.alert-info{background:#eff6ff;color:#1d4ed8;border-color:var(--blue)}
#toast{position:fixed;bottom:74px;left:1rem;right:1rem;padding:.82rem 1.1rem;border-radius:.7rem;font-size:.88rem;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.18)}
#toast.success{background:#0f172a;color:#a7f3d0;border-left:3px solid var(--green)}
#toast.error{background:#0f172a;color:#fca5a5;border-left:3px solid var(--red)}
#toast.info{background:#0f172a;color:#bfdbfe;border-left:3px solid var(--blue)}
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end;backdrop-filter:blur(2px)}
.modal-sheet{background:var(--card);border-radius:1.25rem 1.25rem 0 0;width:100%;max-height:92vh;overflow-y:auto;padding-bottom:1.5rem}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:.65rem auto .2rem}
.modal-header{padding:.65rem 1.25rem 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:.95rem;font-weight:700;letter-spacing:-.02em}
.modal-close{background:none;border:none;font-size:1.25rem;color:var(--muted);cursor:pointer}
.modal-body{padding:.9rem 1.25rem}
.modal-footer{padding:.6rem 1.25rem 0;display:flex;flex-direction:column;gap:.45rem}
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--muted)}
.empty-icon{font-size:2.5rem;margin-bottom:.6rem}
.empty-state p{font-size:.85rem}
.loading-wrap{display:flex;align-items:center;justify-content:center;gap:.6rem;padding:2.5rem;color:var(--muted);font-size:.85rem}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-title">Oficina <span>Mecânico</span></div>
    <div class="auth-sub">Acesso para equipe</div>
    <label class="auth-label">E-mail</label>
    <input class="auth-input" type="email" id="auth-email" placeholder="seu@email.com" autocomplete="email">
    <label class="auth-label">Senha</label>
    <input class="auth-input" type="password" id="auth-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-login" id="btn-login" onclick="doLogin()">Entrar</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <div class="topbar-left">
      <button class="btn-back hidden" id="btn-back" onclick="voltar()">←</button>
      <div style="min-width:0">
        <div class="topbar-title" id="topbar-title">Oficina</div>
        <div class="topbar-sub"   id="topbar-sub">Mecânico</div>
      </div>
    </div>
    <div class="topbar-right" id="topbar-right">
      <button class="btn-top" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div class="page-scroll" id="page-content">
    <div class="loading-wrap"><div class="spinner"></div></div>
  </div>
  <nav class="bottom-nav">
    <button class="nav-tab active" data-tab="buscar" onclick="App.go('buscar')">
      <span class="nav-icon">◎</span><span class="nav-label">Buscar</span>
    </button>
    <button class="nav-tab" data-tab="minhas-os" onclick="App.go('minhas-os')">
      <span class="nav-icon">⊞</span><span class="nav-label">Minhas OS</span>
      <span class="nav-badge hidden" id="badge-os">0</span>
    </button>
    <button class="nav-tab" data-tab="estoque" onclick="App.go('estoque')">
      <span class="nav-icon">▣</span><span class="nav-label">Estoque</span>
    </button>
  </nav>
</div>

<div id="modal-overlay" class="hidden" onclick="fecharModalFora(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modal-title">—</div>
      <button class="modal-close" onclick="fecharModal()">✕</button>
    </div>
    <div class="modal-body"   id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div id="toast" class="hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
var SUPA_URL = 'https://phmtiulbrlnwjllcrjcf.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBobXRpdWxicmxud2psbGNyamNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjgwODksImV4cCI6MjA5MDU0NDA4OX0.vsM7EZckDErY4rGLM-BTfmthW4ern9sT1TnIN6FT4ss';
var APP3_URL = 'https://oficina-app3.vercel.app';

var _sb = null;
function sb() { if (!_sb) _sb = supabase.createClient(SUPA_URL, SUPA_KEY); return _sb; }

function brl(v) { return 'R$\u00a0' + Math.abs(Number(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2}); }
function hoje() { return new Date().toISOString().substring(0,10); }
function dataBR(iso) { if(!iso) return '—'; var p=iso.substring(0,10).split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function maskCPF(v) { return v.replace(/\D/g,'').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2'); }
function maskPhone(v) { return v.replace(/\D/g,'').replace(/(\d{2})(\d)/,'($1) $2').replace(/(\d{5})(\d)/,'$1-$2'); }
function numOS() { var n=new Date(); return n.getFullYear()+''+(n.getMonth()+1).toString().padStart(2,'0')+'-'+(Math.floor(Math.random()*9000)+1000); }
function esc(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"'); }

var SL = {'na_fila':'Na Fila','em_manutencao':'Em Manutenção','aguardando_peca':'Aguard. Peça','pronto_retirada':'Pronto p/ Retirada','pago':'Pago','cancelado':'Cancelado'};
var SC = {'na_fila':'b-nafila','em_manutencao':'b-manut','aguardando_peca':'b-aguard','pronto_retirada':'b-pronto','pago':'b-pago','cancelado':'b-cancelado'};
function badgeOS(s) { return '<span class="badge '+(SC[s]||'')+'">'+(SL[s]||s)+'</span>'; }

var _tTimer;
function toast(msg, tipo) {
  tipo = tipo||'success';
  var el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast '+tipo;
  el.classList.remove('hidden');
  clearTimeout(_tTimer);
  _tTimer = setTimeout(function(){ el.classList.add('hidden'); }, 3500);
}

function abrirModal(titulo, corpo, rodape) {
  document.getElementById('modal-title').textContent = titulo||'';
  document.getElementById('modal-body').innerHTML   = corpo||'';
  document.getElementById('modal-footer').innerHTML = rodape||'';
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function fecharModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
function fecharModalFora(e) { if(e.target.id==='modal-overlay') fecharModal(); }

var _user = null, _funcId = null;

function doLogin() {
  var email = document.getElementById('auth-email').value.trim();
  var pass  = document.getElementById('auth-pass').value;
  var errEl = document.getElementById('auth-error');
  var btn   = document.getElementById('btn-login');
  errEl.textContent = '';
  if(!email||!pass){ errEl.textContent='Preencha e-mail e senha.'; return; }
  btn.textContent = 'Entrando...'; btn.disabled = true;
  sb().auth.signInWithPassword({email:email,password:pass}).then(function(res){
    btn.textContent='Entrar'; btn.disabled=false;
    if(res.error) errEl.textContent='E-mail ou senha incorretos.';
  });
}
function doLogout(){ sb().auth.signOut(); }

sb().auth.onAuthStateChange(function(event, session){
  if(session){
    _user = session.user;
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    sb().from('funcionarios').select('id,nome').eq('email',session.user.email).maybeSingle().then(function(res){
      _funcId = res.data ? res.data.id : null;
      App.init();
    });
  } else {
    _user=null; _funcId=null;
    document.getElementById('auth-screen').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
  }
});

function atualizarBadge(){
  sb().from('ordens_servico').select('id').in('status',['na_fila','em_manutencao','aguardando_peca','pronto_retirada']).then(function(res){
    var n=res.data?res.data.length:0;
    var el=document.getElementById('badge-os');
    if(el){ el.textContent=n; el.classList.toggle('hidden',n===0); }
  });
}

var App = {
  atual:'buscar', _params:{},
  go:function(pag, params){
    this.atual=pag; this._params=params||{};
    sessionStorage.setItem('app2_pag',pag);
    document.querySelectorAll('.nav-tab').forEach(function(t){ t.classList.toggle('active',t.dataset.tab===pag); });
    var comVoltar=['nova-os','nova-os-2','nova-os-3','nova-os-4','detalhe-os','cadastro-cliente'];
    document.getElementById('btn-back').classList.toggle('hidden',comVoltar.indexOf(pag)<0);
    var el=document.getElementById('page-content');
    el.scrollTop=0;
    el.innerHTML='<div class="loading-wrap"><div class="spinner"></div></div>';
    if(pag==='buscar') pgBuscar(el);
    else if(pag==='minhas-os') pgMinhasOS(el);
    else if(pag==='estoque') pgEstoque(el);
    else if(pag==='detalhe-os') pgDetalhOS(el,this._params.osId);
    else if(pag==='nova-os') pgNovaOS1(el);
    else if(pag==='nova-os-2') pgNovaOS2(el);
    else if(pag==='nova-os-3') pgNovaOS3(el);
    else if(pag==='nova-os-4') pgNovaOS4(el);
    else if(pag==='cadastro-cliente') pgCadastroCliente(el);
  },
  init:function(){
    atualizarBadge();
    var saved=sessionStorage.getItem('app2_pag')||'buscar';
    var validas=['buscar','minhas-os','estoque'];
    this.go(validas.indexOf(saved)>=0?saved:'buscar');
  }
};

document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='hidden') sessionStorage.setItem('app2_pag',App.atual);
});

function voltar(){
  var mapa={'nova-os':'buscar','nova-os-2':'nova-os','nova-os-3':'nova-os-2','nova-os-4':'nova-os-3','detalhe-os':'minhas-os','cadastro-cliente':'buscar'};
  App.go(mapa[App.atual]||'buscar');
}
function setTopbar(titulo,sub,acoes){
  document.getElementById('topbar-title').textContent=titulo||'';
  document.getElementById('topbar-sub').textContent=sub||'';
  document.getElementById('topbar-right').innerHTML=acoes||'<button class="btn-top" onclick="doLogout()">Sair</button>';
}

var OS={};
function resetOS(){ OS={clienteId:'',clienteNome:'',clienteTel:'',clienteCPF:'',veiculoId:'',veiculoPlaca:'',veiculoModelo:'',km:'',previsao:'',descricao:'',checklist:{},itens:[],desconto:0}; }
resetOS();

// BUSCAR
function pgBuscar(el){
  setTopbar('Oficina','Buscar cliente ou veículo');
  el.innerHTML='<div class="search-wrap"><div class="search-box"><span style="color:rgba(255,255,255,.4);font-size:.88rem">◎</span>'+
    '<input type="text" id="busca-inp" placeholder="Nome, CPF ou placa..." autocomplete="off" oninput="onBusca(this.value)">'+
    '</div></div><div id="busca-res"><div class="empty-state"><div class="empty-icon">◎</div><p>Digite para buscar</p></div></div>';
}

var _bTimer;
function onBusca(q){
  clearTimeout(_bTimer);
  var t=q.trim();
  if(t.length<2) return;
  _bTimer=setTimeout(function(){ executarBusca(t); },400);
}

function executarBusca(q){
  var resEl=document.getElementById('busca-res');
  if(!resEl) return;
  resEl.innerHTML='<div class="loading-wrap"><div class="spinner"></div>Buscando...</div>';
  var qP=q.replace(/[^A-Za-z0-9]/g,'').toUpperCase();
  var qN=q.replace(/\D/g,'');
  sb().from('veiculos').select('*,clientes(*)').ilike('placa','%'+qP+'%').limit(5).then(function(rv){
    var veics=rv.data||[];
    if(veics.length>0&&veics[0].clientes){ mostrarResultado(veics[0].clientes,veics); return; }
    var pCPF=(qN.length>=3)?sb().from('clientes').select('*').ilike('cpf','%'+qN+'%').limit(3):Promise.resolve({data:[]});
    var pNome=sb().from('clientes').select('*').ilike('nome','%'+q+'%').limit(3);
    Promise.all([pCPF,pNome]).then(function(results){
      var todos=results[0].data||[];
      (results[1].data||[]).forEach(function(c){ if(!todos.find(function(x){return x.id===c.id;})) todos.push(c); });
      if(!todos.length){
        resEl.innerHTML='<div style="padding:1rem"><div class="empty-state"><div class="empty-icon">?</div><p>Nenhum resultado para "'+q+'"</p></div>'+
          '<button class="btn btn-primary btn-full btn-lg" style="margin-top:.5rem" onclick="App.go(\'cadastro-cliente\')">+ Cadastrar Novo Cliente</button></div>';
        return;
      }
      if(todos.length===1){
        sb().from('veiculos').select('*').eq('cliente_id',todos[0].id).then(function(rv2){ mostrarResultado(todos[0],rv2.data||[]); });
      } else {
        resEl.innerHTML='<div style="padding:.75rem 1rem">'+
          '<div style="font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:.5rem">'+todos.length+' cliente(s)</div>'+
          todos.map(function(c){
            return '<div style="background:var(--card);border:1.5px solid var(--border);border-radius:.65rem;padding:.85rem 1rem;margin-bottom:.45rem;cursor:pointer" onclick="selecionarCliente(\''+esc(c.id)+'\')">'+
              '<div style="font-weight:700;font-size:.92rem">'+(c.nome||'')+'</div>'+
              '<div style="font-size:.78rem;color:var(--muted);margin-top:.15rem">'+(c.cpf||'')+(c.telefone?' · '+c.telefone:'')+'</div></div>';
          }).join('')+'</div>';
      }
    });
  });
}

function selecionarCliente(cliId){
  var resEl=document.getElementById('busca-res');
  if(resEl) resEl.innerHTML='<div class="loading-wrap"><div class="spinner"></div></div>';
  Promise.all([sb().from('clientes').select('*').eq('id',cliId).single(),sb().from('veiculos').select('*').eq('cliente_id',cliId)]).then(function(r){
    if(r[0].data) mostrarResultado(r[0].data,r[1].data||[]);
  });
}

function mostrarResultado(cli,veics){
  var resEl=document.getElementById('busca-res');
  if(!resEl) return;
  var badgeCor={novo:'b-nafila',vip:'b-pronto',inativo:'b-cancelado'};
  var veicsHtml=veics.map(function(v){
    return '<div class="veic-option" onclick="selecionarVeiculo(\''+esc(cli.id)+'\',\''+esc(cli.nome||'')+'\',\''+esc(cli.telefone||'')+'\',\''+esc(cli.cpf||'')+'\',\''+esc(v.id)+'\',\''+esc(v.placa||'')+'\',\''+esc(((v.marca||'')+' '+(v.modelo||'')).trim())+'\')">'+
      '<div><div style="font-weight:700;font-size:.9rem">'+(v.placa||'')+'</div>'+
      '<div style="font-size:.77rem;color:var(--muted)">'+(v.marca||'')+' '+(v.modelo||'')+(v.ano?' '+v.ano:'')+'</div></div>'+
      '<span style="color:var(--muted)">›</span></div>';
  }).join('');
  var tel=(cli.telefone||'').replace(/\D/g,'');
  var waHtml=tel?'<a class="btn btn-whatsapp btn-full" style="margin:.25rem 0 .5rem" href="https://wa.me/55'+tel+'" target="_blank">WhatsApp</a>':'';
  resEl.innerHTML='<div class="result-card">'+
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem">'+
    '<div><div style="font-weight:800;font-size:1rem">'+(cli.nome||'')+'</div>'+
    '<div style="font-size:.8rem;color:var(--muted);margin-top:.15rem">'+(cli.cpf||'')+(cli.telefone?' · '+cli.telefone:'')+'</div></div>'+
    '<span class="badge '+(badgeCor[cli.status]||'b-nafila')+'">'+(cli.status||'novo').toUpperCase()+'</span></div>'+
    waHtml+
    '<div style="font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:.4rem">Selecione o veículo</div>'+
    veicsHtml+
    '<button class="btn btn-secondary btn-full" style="margin-top:.5rem" onclick="abrirAddVeiculo(\''+esc(cli.id)+'\',\''+esc(cli.nome||'')+'\')">+ Adicionar Veículo</button>'+
    '</div>';
}

function selecionarVeiculo(cliId,cliNome,cliTel,cliCPF,veicId,placa,modelo){
  resetOS();
  OS.clienteId=cliId;OS.clienteNome=cliNome;OS.clienteTel=cliTel;OS.clienteCPF=cliCPF;
  OS.veiculoId=veicId;OS.veiculoPlaca=placa;OS.veiculoModelo=modelo;
  App.go('nova-os');
}

function avancar1(){
  var km=document.getElementById('os-km').value.trim();
  var prev=document.getElementById('os-prev').value;
  var desc=document.getElementById('os-desc').value.trim();
  if(!km){toast('KM atual é obrigatório','error');return;}
  if(!prev){toast('Data de previsão é obrigatória','error');return;}
  if(!desc){toast('Descrição é obrigatória','error');return;}
  OS.km=km;OS.previsao=prev;OS.descricao=desc;
  App.go('nova-os-2');
}

// NOVA OS 2 — INSPEÇÃO
var ITENS_CHECK=['Motor','Câmbio','Freios','Pneus','Luzes','Ar condicionado','Sistema elétrico','Suspensão','Lataria/Pintura','Vidros','Nível de fluidos','Extintor'];
function pgNovaOS2(el){
  setTopbar('Inspeção Visual','Passo 2 de 4');
  var h=ITENS_CHECK.map(function(item){
    var a=OS.checklist[item]||'';
    var id2='ci-'+item.replace(/[\s\/]/g,'_');
    return '<div class="check-item '+a+'" id="'+id2+'">'+
      '<div class="check-label">'+item+'</div>'+
      '<div class="check-btns">'+
      '<button class="check-btn '+(a==='ok'?'ok':'')+'" onclick="setCheck(\''+esc(item)+'\',\'ok\',this)">OK</button>'+
      '<button class="check-btn '+(a==='atencao'?'atencao':'')+'" onclick="setCheck(\''+esc(item)+'\',\'atencao\',this)">Atenção</button>'+
      '<button class="check-btn '+(a==='critico'?'critico':'')+'" onclick="setCheck(\''+esc(item)+'\',\'critico\',this)">Crítico</button>'+
      '</div></div>';
  }).join('');
  el.innerHTML='<div style="padding:1rem">'+
    '<div class="steps"><div class="step-dot done"></div><div class="step-dot active"></div><div class="step-dot"></div><div class="step-dot"></div></div>'+
    '<div class="step-label">Marque o estado de cada item</div>'+h+
    '<button class="btn btn-primary btn-full btn-lg" style="margin-top:.75rem" onclick="avancar2()">Próximo — Serviços e Peças</button></div>';
}
function setCheck(item,status,btn){
  OS.checklist[item]=status;
  var id2='ci-'+item.replace(/[\s\/]/g,'_');
  var card=document.getElementById(id2);
  if(card) card.className='check-item '+status;
  var btns=btn.closest('.check-btns').querySelectorAll('.check-btn');
  btns.forEach(function(b){b.classList.remove('ok','atencao','critico');});
  btn.classList.add(status);
}
function avancar2(){
  var sem=ITENS_CHECK.filter(function(i){return!OS.checklist[i];});
  if(sem.length>0){toast('Marque todos os itens ('+sem.length+' pendentes)','error');return;}
  App.go('nova-os-3');
}

  setTopbar('Serviços e Peças','Passo 3 de 4');
  sb().from('estoque').select('id,nome,valor_venda,quantidade').gt('quantidade',0).order('nome').then(function(res){
    _estoque=res.data||[];

      '<div class="steps"><div class="step-dot done"></div><div class="step-dot done"></div><div class="step-dot active"></div><div class="step-dot"></div></div>'+
      '<div class="step-label">Adicione serviços e peças do estoque</div>'+
      '<div id="itens-lista"></div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:1rem">'+
      '<button class="btn btn-blue btn-full" onclick="addItem(\'servico\')">+ Serviço</button>'+
      '<button class="btn btn-purple btn-full" onclick="addItem(\'peca\')">+ Peça</button></div>'+
      '<div class="card card-pad" style="margin-bottom:1rem">'+
      '<div class="total-row"><span style="color:var(--muted)">Serviços</span><strong id="sub-svc">R$ 0,00</strong></div>'+
      '<div class="total-row"><span style="color:var(--muted)">Peças</span><strong id="sub-pec">R$ 0,00</strong></div>'+
      '<div style="display:flex;align-items:center;gap:.5rem;margin:.4rem 0">'+
      '<span style="color:var(--muted);font-size:.82rem;white-space:nowrap">Desconto R$</span>'+
      '<input type="number" id="os-desconto" value="'+(OS.desconto||0)+'" min="0" step="0.01" inputmode="decimal"'+
      ' style="flex:1;padding:.5rem .75rem;border:1.5px solid var(--border);border-radius:.55rem;font-size:.9rem;font-family:inherit" oninput="calcTotal()">'+
      '</div><div class="total-row total-destaque"><span>Total</span><span id="total-final">R$ 0,00</span></div></div>'+
      '<button class="btn btn-primary btn-full btn-lg" onclick="avancar3()">Próximo — Confirmação</button></div>';
    renderItens(); calcTotal();
  });
}
function renderItens(){
  var el=document.getElementById('itens-lista');
  if(!el) return;
  if(!OS.itens.length){ el.innerHTML='<p style="text-align:center;color:var(--muted);font-size:.82rem;padding:.5rem 0 1rem">Nenhum item adicionado</p>'; return; }
  el.innerHTML=OS.itens.map(function(it,i){
    var cB=it.tipo==='servico'?'#fff7ed':'#eff6ff';
    var cD=it.tipo==='servico'?'#fed7aa':'#bfdbfe';
    var cT=it.tipo==='servico'?'#c2410c':'#1d4ed8';
    return '<div style="display:grid;grid-template-columns:1fr auto;gap:.4rem;align-items:center;padding:.65rem .85rem;border:1.5px solid '+cD+';border-radius:.6rem;margin-bottom:.4rem;background:'+cB+'">'+
      '<div><div style="font-size:.68rem;font-weight:800;color:'+cT+';text-transform:uppercase">'+(it.tipo==='servico'?'Serviço':'Peça')+'</div>'+
      '<div style="font-weight:700;font-size:.88rem;margin-top:.1rem">'+(it.descricao||'')+'</div>'+
      '<div style="font-size:.75rem;color:var(--muted)">'+it.quantidade+'x '+brl(it.valor_unitario)+' = '+brl(it.valor_total)+'</div></div>'+
      '<button onclick="removeItem('+i+')" style="background:#fee2e2;border:none;color:var(--red);width:30px;height:30px;border-radius:.4rem;cursor:pointer;font-size:.85rem">✕</button></div>';
  }).join('');
}
function addItem(tipo){
  var pecaSel=tipo==='peca'?
    '<div class="form-group"><label>Peça do Estoque</label>'+
    '<select id="mi-peca-sel" onchange="autoFillPeca(this)">'+
    '<option value="">Selecionar do estoque...</option>'+
    _estoque.map(function(p){return '<option value="'+esc(p.id)+'" data-nome="'+esc(p.nome||'')+'" data-val="'+(p.valor_venda||0)+'">'+p.nome+' (disp: '+p.quantidade+')</option>';}).join('')+
    '</select></div>':'';
  abrirModal('Adicionar '+(tipo==='servico'?'Serviço':'Peça'),
    pecaSel+
    '<div class="form-group"><label>Descrição</label><input type="text" id="mi-desc" placeholder="'+(tipo==='servico'?'Nome do serviço':'Nome da peça')+'"></div>'+
    '<div class="form-2col">'+
    '<div class="form-group"><label>Quantidade</label><input type="number" id="mi-qtd" value="1" min="0.01" step="0.01" inputmode="decimal"></div>'+
    '<div class="form-group"><label>Valor Unit. R$</label><input type="number" id="mi-unit" value="0" min="0" step="0.01" inputmode="decimal"></div></div>',
    '<button class="btn btn-secondary btn-full" onclick="fecharModal()">Cancelar</button>'+
    '<button class="btn btn-primary btn-full" onclick="confirmarItem(\''+tipo+'\')">Adicionar</button>'
  );
  setTimeout(function(){ var d=document.getElementById('mi-desc'); if(d&&tipo==='servico') d.focus(); },200);
}
function autoFillPeca(sel){
  var opt=sel.options[sel.selectedIndex];
  var desc=document.getElementById('mi-desc');
  var unit=document.getElementById('mi-unit');
  if(desc&&opt.dataset.nome) desc.value=opt.dataset.nome;
  if(unit&&opt.dataset.val)  unit.value=parseFloat(opt.dataset.val)||0;
}
function confirmarItem(tipo){
  var desc=document.getElementById('mi-desc').value.trim();
  var qtd=parseFloat(document.getElementById('mi-qtd').value)||1;
  var unit=parseFloat(document.getElementById('mi-unit').value)||0;
  if(!desc){toast('Preencha a descrição','error');return;}
  OS.itens.push({tipo:tipo,descricao:desc,quantidade:qtd,valor_unitario:unit,valor_total:qtd*unit});
  fecharModal();renderItens();calcTotal();
}
function removeItem(i){ OS.itens.splice(i,1);renderItens();calcTotal(); }
function calcTotal(){
  var svcs=0,pecs=0;
  OS.itens.forEach(function(it){if(it.tipo==='servico')svcs+=it.valor_total;else pecs+=it.valor_total;});
  var desc=parseFloat((document.getElementById('os-desconto')||{}).value||0)||0;
  var s=document.getElementById('sub-svc');if(s)s.textContent=brl(svcs);
  var p=document.getElementById('sub-pec');if(p)p.textContent=brl(pecs);
  var t=document.getElementById('total-final');if(t)t.textContent=brl(svcs+pecs-desc);
}
function avancar3(){ OS.desconto=parseFloat(document.getElementById('os-desconto').value)||0;App.go('nova-os-4'); }

// NOVA OS 4 — CONFIRMAÇÃO
function row(lbl,val){ return '<div style="display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:.35rem"><span style="color:var(--muted)">'+lbl+'</span><strong>'+val+'</strong></div>'; }
function pgNovaOS4(el){
  setTopbar('Confirmar OS','Passo 4 de 4');
  var svcs=0,pecs=0;
  OS.itens.forEach(function(it){if(it.tipo==='servico')svcs+=it.valor_total;else pecs+=it.valor_total;});
  var total=svcs+pecs-(OS.desconto||0);
  var criticos=Object.keys(OS.checklist).filter(function(k){return OS.checklist[k]==='critico';});
  var atencao=Object.keys(OS.checklist).filter(function(k){return OS.checklist[k]==='atencao';});
  el.innerHTML='<div style="padding:1rem">'+
    '<div class="steps"><div class="step-dot done"></div><div class="step-dot done"></div><div class="step-dot done"></div><div class="step-dot active"></div></div>'+
    '<div class="step-label">Revise e confirme</div>'+
    (criticos.length?'<div class="alert alert-danger">Críticos: '+criticos.join(', ')+'</div>':'')+
    (atencao.length?'<div class="alert alert-warning">Atenção: '+atencao.join(', ')+'</div>':'')+
    '<div class="card card-pad" style="margin-bottom:.75rem"><div class="form-section" style="margin-top:0">Dados</div>'+
    row('Cliente',OS.clienteNome)+row('Veículo',OS.veiculoPlaca+' '+OS.veiculoModelo)+
    row('KM',OS.km+'km')+row('Previsão',dataBR(OS.previsao))+'</div>'+
    '<div class="card card-pad" style="margin-bottom:.75rem"><div class="form-section" style="margin-top:0">Reclamação</div><div style="font-size:.88rem">'+OS.descricao+'</div></div>'+
    '<div class="card card-pad" style="margin-bottom:.75rem"><div class="form-section" style="margin-top:0">Itens ('+OS.itens.length+')</div>'+
    OS.itens.map(function(it){return '<div style="display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:.3rem"><span style="color:var(--muted)">'+(it.tipo==='servico'?'Serv':'Peça')+'</span><span style="flex:1;padding:0 .5rem">'+it.descricao+'</span><strong>'+brl(it.valor_total)+'</strong></div>';}).join('')+
    '<div class="total-row total-destaque"><span>Total</span><span>'+brl(total)+'</span></div></div>'+
    '<button class="btn btn-primary btn-full btn-lg" id="btn-salvar-os" onclick="salvarOS()">Abrir Ordem de Serviço</button>'+
    '<div style="height:.5rem"></div></div>';
}
function salvarOS(){
  var btn=document.getElementById('btn-salvar-os');
  if(btn){btn.textContent='Salvando...';btn.disabled=true;}
  var svcs=0,pecs=0;
  OS.itens.forEach(function(it){if(it.tipo==='servico')svcs+=it.valor_total;else pecs+=it.valor_total;});
  var total=svcs+pecs-(OS.desconto||0);
  var numero=numOS();
  sb().from('ordens_servico').insert({
    numero:numero,cliente_id:OS.clienteId,veiculo_id:OS.veiculoId,
    descricao:OS.descricao,data_previsao:OS.previsao||null,
    quilometragem_entrada:OS.km||null,valor_servicos:svcs,valor_pecas:pecs,
    desconto:OS.desconto||0,valor_total:total,status:'na_fila',
    checklist_inspecao:OS.checklist,mecanico_id:_funcId||null
  }).select().single().then(function(res){
    if(res.error){toast('Erro: '+res.error.message,'error');if(btn){btn.textContent='Abrir Ordem de Serviço';btn.disabled=false;}return;}
    var osData=res.data;
    var iIns=OS.itens.map(function(it){return{os_id:osData.id,tipo:it.tipo,descricao:it.descricao,quantidade:it.quantidade,valor_unitario:it.valor_unitario,valor_total:it.valor_total};});
    var pIns=iIns.length>0?sb().from('os_itens').insert(iIns):Promise.resolve({});
    pIns.then(function(){
      sb().from('clientes').select('total_gasto').eq('id',OS.clienteId).single().then(function(rc){
        var antigo=rc.data?Number(rc.data.total_gasto)||0:0;
        sb().from('clientes').update({ultima_visita:hoje(),total_gasto:antigo+total}).eq('id',OS.clienteId).then(function(){
          atualizarBadge();toast('OS '+numero+' aberta!');resetOS();App.go('detalhe-os',{osId:osData.id});
        });
      });
    });
  });
}

// MINHAS OS
var _filtroOS='ativas';
function pgMinhasOS(el){
  setTopbar('Ordens de Serviço','Acompanhamento');
  var filtros=[{k:'ativas',l:'Ativas'},{k:'na_fila',l:'Na Fila'},{k:'em_manutencao',l:'Manutenção'},{k:'aguardando_peca',l:'Aguard. Peça'},{k:'pronto_retirada',l:'Pronto'},{k:'pago',l:'Pago'}];
  var fHtml=filtros.map(function(f){
    var a=_filtroOS===f.k;
    return '<button style="padding:.35rem .8rem;border-radius:999px;flex-shrink:0;cursor:pointer;font-size:.75rem;font-weight:700;font-family:inherit;border:1.5px solid '+(a?'var(--amber)':'var(--border)')+';background:'+(a?'var(--amber)':'#fff')+';color:'+(a?'var(--navy)':'var(--muted)')+'"'+
      ' onclick="_filtroOS=\''+f.k+'\';pgMinhasOS(document.getElementById(\'page-content\'))">'+f.l+'</button>';
  }).join('');
  el.innerHTML='<div style="padding:.65rem 1rem .25rem;display:flex;gap:.4rem;overflow-x:auto;-webkit-overflow-scrolling:touch">'+fHtml+'</div>'+
    '<div style="padding:.65rem 1rem" id="os-lista"><div class="loading-wrap"><div class="spinner"></div></div></div>';
  var q=sb().from('ordens_servico').select('id,numero,status,valor_total,data_entrada,clientes(nome),veiculos(placa,modelo,marca)').order('data_entrada',{ascending:false});
  if(_filtroOS==='ativas') q=q.in('status',['na_fila','em_manutencao','aguardando_peca','pronto_retirada']);
  else q=q.eq('status',_filtroOS);
  q.limit(40).then(function(res){
    var lista=res.data||[];
    var listaEl=document.getElementById('os-lista');
    if(!listaEl) return;
    if(!lista.length){listaEl.innerHTML='<div class="empty-state"><div class="empty-icon">⊞</div><p>Nenhuma OS</p></div>';return;}
    listaEl.innerHTML=lista.map(function(o){
      return '<div class="os-card" onclick="App.go(\'detalhe-os\',{osId:\''+o.id+'\'})">'+

        '<div><div class="os-num">'+o.numero+'</div>'+

        '<div style="font-size:1.15rem;font-weight:800;color:var(--green);text-align:center;margin:.5rem 0">Total: '+brl(os.valor_total)+'</div>'+

      var tel3=(os.clientes&&os.clientes.telefone)?os.clientes.telefone.replace(/\D/g,''):'';
      var waMsg='Olá '+(os.clientes?os.clientes.nome||'':'')+'! Pagamento confirmado. OS: '+os.numero+' | Total: '+brl(os.valor_total)+'. Obrigado!';
      pagoHtml='<div class="alert alert-success">Pago em '+dataBR(os.data_pagamento)+' via '+(os.forma_pagamento||'—')+'</div>'+
        (!os.avaliacao?'<div class="card card-pad" style="margin-bottom:.75rem;text-align:center"><div style="font-weight:700;margin-bottom:.5rem;font-size:.9rem">Como foi o serviço?</div>'+
          '<div style="display:flex;gap:.4rem;justify-content:center;margin:.5rem 0">'+
          [1,2,3,4,5].map(function(i){return '<button style="font-size:1.8rem;background:none;border:none;cursor:pointer" onclick="avaliarOS(\''+esc(osId)+'\','+i+')">★</button>';}).join('')+
          '</div></div>':'<div style="text-align:center;font-size:1.2rem;margin-bottom:.75rem">'+'★'.repeat(os.avaliacao)+'</div>')+
        '<button class="btn btn-primary btn-full" style="margin-bottom:.45rem" onclick="gerarPDF(\''+esc(osId)+'\')">Gerar Recibo PDF</button>'+
        (tel3?'<a class="btn btn-whatsapp btn-full" href="https://wa.me/55'+tel3+'?text='+encodeURIComponent(waMsg)+'" target="_blank">Enviar via WhatsApp</a>':'');

      var link3=APP3_URL+'?cpf='+cpf4;
      var msgs={'na_fila':'Olá! Seu veículo está na fila. Veja: '+link3,'em_manutencao':'Olá! Trabalhando no seu veículo. Veja: '+link3,'aguardando_peca':'Olá! Aguardando peça, já já fica pronto! Veja: '+link3,'pronto_retirada':'Olá! Seu veículo está pronto para retirada! Veja: '+link3};
      var waMsgS=msgs[os.status]||'Atualização da OS '+os.numero+': '+(SL[os.status]||os.status);
      waStatus='<a class="btn btn-whatsapp btn-full" style="margin-bottom:.5rem" href="https://wa.me/55'+tel4+'?text='+encodeURIComponent(waMsgS)+'" target="_blank">Atualizar via WhatsApp</a>';

      '<div><div style="font-size:1.05rem;font-weight:800">'+os.numero+'</div>'+
      '<div style="font-size:.92rem;font-weight:600;margin-top:.1rem">'+(os.clientes?os.clientes.nome:'—')+'</div>'+
      '<div style="font-size:.78rem;color:var(--muted)">'+(os.veiculos?os.veiculos.placa+' '+(os.veiculos.marca||'')+' '+(os.veiculos.modelo||''):'')+'</div></div>'+
      badgeOS(os.status)+'</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:.4rem;font-size:.8rem">'+
      '<div><span style="color:var(--muted)">Entrada: </span>'+dataBR(os.data_entrada)+'</div>'+
      '<div><span style="color:var(--muted)">Previsão: </span>'+dataBR(os.data_previsao)+'</div>'+
      '<div><span style="color:var(--muted)">KM: </span>'+(os.quilometragem_entrada||'—')+'</div>'+
      '<div><span style="color:var(--muted)">Total: </span><strong style="color:var(--green)">'+brl(os.valor_total)+'</strong></div>'+
      '</div></div>'+
      (os.descricao?'<div class="alert alert-warning" style="font-size:.82rem">'+os.descricao+'</div>':'')+
      '<div class="card" style="margin-bottom:.75rem">'+
      '<div style="padding:.75rem 1rem;border-bottom:1px solid var(--border);font-size:.78rem;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.05em">Serviços e Peças</div>'+
      itensHtml+
      '<div style="padding:.7rem .9rem;text-align:right">'+
      (os.desconto>0?'<div style="font-size:.82rem;color:var(--muted)">Desconto: -'+brl(os.desconto)+'</div>':'')+
      '<div style="font-size:1.05rem;font-weight:800;color:var(--green)">Total: '+brl(os.valor_total)+'</div></div></div>'+

function bStatus(osId,status,label,bg,cor){
  return '<button style="flex:1;padding:.7rem;border-radius:.6rem;border:none;background:'+bg+';color:'+cor+';font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit" onclick="mudarStatus(\''+esc(osId)+'\',\''+status+'\')">'+label+'</button>';
}
function mudarStatus(osId,novoStatus){
  sb().from('ordens_servico').update({status:novoStatus}).eq('id',osId).then(function(res){
    if(res.error){toast('Erro: '+res.error.message,'error');return;}
    toast('Status: '+(SL[novoStatus]||novoStatus));
    atualizarBadge();pgDetalhOS(document.getElementById('page-content'),osId);
  });
}
function abrirChecklistSaida(osId){
  var itens=['Motor ligado OK','Freios OK','Luzes OK','Serviço concluído','Limpeza do veículo','Documentos devolvidos'];
  window._csOk={};
  var h='<div style="font-size:.82rem;color:var(--muted);margin-bottom:.85rem">Confirme todos os itens.</div>';
  h+=itens.map(function(it){
    var id2=it.replace(/\s/g,'_');
    return '<div style="display:flex;align-items:center;justify-content:space-between;padding:.75rem;border:1.5px solid var(--border);border-radius:.6rem;margin-bottom:.4rem;transition:.2s" id="cs-'+id2+'">'+
      '<span style="font-weight:600;font-size:.88rem">'+it+'</span>'+
      '<button onclick="toggleCS(\''+esc(id2)+'\',\''+esc(it)+'\')" id="csb-'+id2+'" style="padding:.38rem .75rem;border:1.5px solid var(--border);border-radius:.5rem;background:#fff;cursor:pointer;font-size:.78rem;font-weight:600;font-family:inherit">Pendente</button>'+
      '</div>';
  }).join('');
  abrirModal('Checklist de Saída',h,
    '<button class="btn btn-secondary btn-full" onclick="fecharModal()">Cancelar</button>'+
    '<button class="btn btn-success btn-full" onclick="confirmarConclusao(\''+esc(osId)+'\')">Confirmar Conclusão</button>'
  );
}
function toggleCS(id,nome){
  var btn=document.getElementById('csb-'+id);
  var card=document.getElementById('cs-'+id);
  if(window._csOk[nome]){
    delete window._csOk[nome];
    if(btn){btn.textContent='Pendente';btn.style.cssText='padding:.38rem .75px;border:1.5px solid var(--border);border-radius:.5rem;background:#fff;cursor:pointer;font-size:.78rem;font-weight:600;font-family:inherit';}
    if(card){card.style.borderColor='var(--border)';card.style.background='#fff';}
  } else {
    window._csOk[nome]=true;
    if(btn){btn.textContent='OK';btn.style.cssText='padding:.38rem .75rem;border:1.5px solid #10b981;border-radius:.5rem;background:#d1fae5;color:#065f46;cursor:pointer;font-size:.78rem;font-weight:600;font-family:inherit';}
    if(card){card.style.borderColor='#10b981';card.style.background='#f0fdf4';}
  }
}
function confirmarConclusao(osId){
  var itens=['Motor ligado OK','Freios OK','Luzes OK','Serviço concluído','Limpeza do veículo','Documentos devolvidos'];
  var pend=itens.filter(function(i){return!window._csOk[i];});
  if(pend.length>0){toast('Confirme todos ('+pend.length+' pendentes)','error');return;}
  sb().from('ordens_servico').update({status:'pronto_retirada',checklist_saida:window._csOk,data_conclusao:new Date().toISOString()}).eq('id',osId).then(function(res){
    if(res.error){toast('Erro: '+res.error.message,'error');return;}
    toast('OS pronta para retirada!');fecharModal();atualizarBadge();pgDetalhOS(document.getElementById('page-content'),osId);
  });
}
function fecharOS(osId,valorOriginal){
  var formaPag=document.getElementById('forma-pag').value;
  var descExtra=parseFloat(document.getElementById('desc-extra').value)||0;
  var valorFinal=Math.max(0,Number(valorOriginal)-descExtra);
  sb().from('ordens_servico').update({status:'pago',forma_pagamento:formaPag,data_pagamento:new Date().toISOString(),valor_total:valorFinal}).eq('id',osId).select().single().then(function(res){
    if(res.error){toast('Erro: '+res.error.message,'error');return;}
    var osNum=res.data?res.data.numero:osId;
    sb().from('financeiro_entradas').insert({os_id:osId,descricao:'OS '+osNum,valor:valorFinal,forma_pagamento:formaPag,data_recebimento:hoje(),status:'recebido',categoria:'Serviço'}).then(function(){
      toast('OS fechada!');atualizarBadge();pgDetalhOS(document.getElementById('page-content'),osId);
    });
  });
}
function avaliarOS(osId,nota){
  abrirModal('Avaliação',
    '<div style="text-align:center;font-size:2rem;margin-bottom:.75rem">'+'★'.repeat(nota)+'</div>'+
    '<div class="form-group"><label>Comentário (opcional)</label><textarea id="av-coment" placeholder="Como foi o atendimento?"></textarea></div>',
    '<button class="btn btn-secondary btn-full" onclick="fecharModal()">Pular</button>'+
    '<button class="btn btn-primary btn-full" onclick="confirmarAvaliacao(\''+esc(osId)+'\','+nota+')">Enviar</button>'
  );
}
function confirmarAvaliacao(osId,nota){
  var coment=document.getElementById('av-coment')?document.getElementById('av-coment').value.trim():'';
  sb().from('ordens_servico').update({avaliacao:nota,comentario_avaliacao:coment}).eq('id',osId).then(function(){
    toast('Avaliação enviada!');fecharModal();pgDetalhOS(document.getElementById('page-content'),osId);
  });
}

// PDF RECIBO
function gerarPDF(osId){
  Promise.all([
    sb().from('ordens_servico').select('*,clientes(*),veiculos(*)').eq('id',osId).single(),
    sb().from('os_itens').select('*').eq('os_id',osId)
  ]).then(function(results){
    var os=results[0].data;if(!os)return;
    var itens=results[1].data||[];
    var doc=new window.jspdf.jsPDF({unit:'mm',format:'a4'});
    doc.setFillColor(17,24,39);doc.rect(0,0,210,22,'F');
    doc.setFontSize(14);doc.setFont('helvetica','bold');doc.setTextColor(245,158,11);
    doc.text('RECIBO DE SERVIÇO',105,10,{align:'center'});
    doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(200,200,200);
    doc.text('OS: '+os.numero+'  |  Data: '+dataBR(os.data_pagamento||os.created_at),105,17,{align:'center'});
    doc.setTextColor(0,0,0);
    var y=30;
    doc.setFillColor(248,249,250);doc.rect(10,y-4,190,24,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(8);
    doc.text('CLIENTE',14,y);doc.text('VEÍCULO',110,y);
    doc.setFont('helvetica','normal');doc.setFontSize(9);
    doc.text(os.clientes?os.clientes.nome:'—',14,y+6);
    doc.text('CPF: '+(os.clientes?os.clientes.cpf||'—':'—'),14,y+12);
    doc.text('Tel: '+(os.clientes?os.clientes.telefone||'—':'—'),14,y+18);
    doc.text((os.veiculos?os.veiculos.placa+' — '+(os.veiculos.marca||'')+' '+(os.veiculos.modelo||''):'—'),110,y+6);
    doc.text('Ano: '+(os.veiculos?os.veiculos.ano||'—':'—')+' KM: '+(os.quilometragem_entrada||'—'),110,y+12);
    y+=30;
    if(os.descricao){
      doc.setFont('helvetica','bold');doc.setFontSize(8);doc.text('Reclamação:',14,y);y+=5;
      doc.setFont('helvetica','normal');doc.setFontSize(8);
      var lines=doc.splitTextToSize(os.descricao,180);doc.text(lines,14,y);y+=lines.length*4+4;
    }
    doc.setFillColor(17,24,39);doc.rect(10,y,190,7,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(255,255,255);
    doc.text('TIPO',14,y+5);doc.text('DESCRIÇÃO',38,y+5);doc.text('QTD',130,y+5);doc.text('UNIT.',148,y+5);doc.text('TOTAL',172,y+5);
    y+=10;doc.setTextColor(0,0,0);
    itens.forEach(function(it,i){
      if(i%2===1){doc.setFillColor(248,249,250);doc.rect(10,y-4,190,8,'F');}
      doc.setFont('helvetica','bold');doc.setFontSize(7.5);doc.text(it.tipo==='servico'?'Serviço':'Peça',14,y);
      doc.setFont('helvetica','normal');doc.text(it.descricao||'',38,y);
      doc.text(String(it.quantidade||1),130,y);doc.text(brl(it.valor_unitario),148,y);
      doc.text(brl(it.valor_total),196,y,{align:'right'});
      y+=8;if(y>260){doc.addPage();y=20;}
    });
    y+=4;
    doc.setFont('helvetica','normal');doc.setFontSize(8.5);
    doc.text('Serviços: '+brl(os.valor_servicos),196,y,{align:'right'});y+=6;
    doc.text('Peças: '+brl(os.valor_pecas),196,y,{align:'right'});y+=6;
    if(os.desconto>0){doc.text('Desconto: -'+brl(os.desconto),196,y,{align:'right'});y+=6;}
    doc.setFillColor(17,24,39);doc.rect(130,y-5,70,9,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(245,158,11);
    doc.text('TOTAL: '+brl(os.valor_total),196,y+1,{align:'right'});
    doc.setTextColor(0,0,0);y+=14;
    doc.setFont('helvetica','normal');doc.setFontSize(8);
    doc.text('Pagamento: '+(os.forma_pagamento||'—'),14,y);y+=18;
    doc.line(14,y,90,y);doc.line(120,y,196,y);
    doc.setFontSize(7.5);
    doc.text('Assinatura do Cliente',52,y+5,{align:'center'});
    doc.text('Responsável pela Oficina',158,y+5,{align:'center'});
    doc.save('recibo-'+os.numero+'.pdf');
    toast('Recibo gerado!');
  });
}

// ESTOQUE
var _estSearch='',_estTimer2;
function pgEstoque(el){
  setTopbar('Estoque','Peças e produtos','<button class="btn-top" onclick="abrirEntradaEstoque()">+ Entrada</button> <button class="btn-top" onclick="doLogout()">Sair</button>');
  el.innerHTML='<div style="padding:.75rem 1rem"><div style="display:flex;align-items:center;gap:.6rem;background:#fff;border:1.5px solid var(--border);border-radius:.7rem;padding:.65rem .9rem">'+
    '<span style="color:var(--muted);font-size:.88rem">◎</span>'+
    '<input type="text" placeholder="Buscar produto..." style="flex:1;background:none;border:none;outline:none;font-size:.92rem;font-family:inherit;color:var(--text)"'+
    ' oninput="clearTimeout(_estTimer2);_estTimer2=setTimeout(function(){_estSearch=this.value.toLowerCase();carregarEstoque();}.bind(this),400)">'+
    '</div></div><div id="est-lista" style="background:#fff;border-top:1px solid var(--border)"><div class="loading-wrap"><div class="spinner"></div></div></div>';
  carregarEstoque();
}
function carregarEstoque(){
  sb().from('estoque').select('id,nome,categoria,quantidade,quantidade_minima,unidade').order('nome').then(function(res){
    var lista=res.data||[];
    var el=document.getElementById('est-lista');
    if(!el) return;
    var f=_estSearch?lista.filter(function(p){return(p.nome||'').toLowerCase().includes(_estSearch)||(p.categoria||'').toLowerCase().includes(_estSearch);}):lista;
    var alertas=f.filter(function(p){return Number(p.quantidade)<=Number(p.quantidade_minima);});
    var html='';
    if(alertas.length) html+='<div class="alert alert-danger" style="margin:.65rem">Estoque mínimo: '+alertas.map(function(p){return p.nome;}).join(', ')+'</div>';
    if(!f.length){html+='<div class="empty-state"><div class="empty-icon">▣</div><p>Nenhum produto</p></div>';}
    else{html+=f.map(function(p){
      var ok=Number(p.quantidade)>Number(p.quantidade_minima);
      var warn=Number(p.quantidade)===Number(p.quantidade_minima);
      var cor=ok?'var(--green)':warn?'var(--amber)':'var(--red)';
      return '<div class="produto-row"><div><div style="font-weight:700;font-size:.9rem">'+(p.nome||'')+'</div><div style="font-size:.73rem;color:var(--muted)">'+(p.categoria||'—')+'</div></div>'+
        '<div style="text-align:right"><div style="font-size:.98rem;font-weight:800;color:'+cor+'">'+p.quantidade+' '+(p.unidade||'un')+'</div><div style="font-size:.7rem;color:var(--muted)">mín: '+p.quantidade_minima+'</div></div></div>';
    }).join('');}
    el.innerHTML=html;
  });
}
function abrirEntradaEstoque(){
  sb().from('estoque').select('id,nome,quantidade').order('nome').then(function(res){
    var prods=res.data||[];
    abrirModal('Entrada de Estoque',
      '<div class="form-group"><label class="req">Produto</label>'+
      '<select id="ee-prod"><option value="">Selecione...</option>'+prods.map(function(p){return '<option value="'+esc(p.id)+'">'+p.nome+' (atual: '+p.quantidade+')</option>';}).join('')+'</select></div>'+
      '<div class="form-group"><label class="req">Quantidade</label><input type="number" id="ee-qtd" value="1" min="0.01" step="0.01" inputmode="decimal"></div>'+
      '<div class="form-group"><label class="req">Custo Unitário R$</label><input type="number" id="ee-custo" value="0" step="0.01" inputmode="decimal"></div>'+
      '<div class="form-group"><label>Observação</label><input type="text" id="ee-obs" placeholder="Nota fiscal..."></div>',
      '<button class="btn btn-secondary btn-full" onclick="fecharModal()">Cancelar</button>'+
      '<button class="btn btn-primary btn-full" onclick="confirmarEntrada()">Registrar Entrada</button>'
    );
  });
}
function confirmarEntrada(){
  var prodId=document.getElementById('ee-prod').value;
  var qtd=parseFloat(document.getElementById('ee-qtd').value)||0;
  var custo=parseFloat(document.getElementById('ee-custo').value)||0;
  var obs=document.getElementById('ee-obs').value;
  if(!prodId){toast('Selecione o produto','error');return;}
  if(qtd<=0){toast('Informe a quantidade','error');return;}
  if(!custo){toast('Informe o custo unitário','error');return;}
  sb().from('estoque').select('quantidade').eq('id',prodId).single().then(function(res){
    var nova=(Number(res.data?res.data.quantidade:0)||0)+qtd;
    Promise.all([
      sb().from('estoque').update({quantidade:nova,valor_custo:custo}).eq('id',prodId),
      sb().from('estoque_movimentos').insert({produto_id:prodId,tipo:'entrada',quantidade:qtd,valor_unitario:custo,observacoes:obs})
    ]).then(function(){toast('Entrada registrada! Total: '+nova);fecharModal();carregarEstoque();});
  });
}

function salvarNovoCliente(){
  var campos=[['nc-nome','Nome'],['nc-cpf','CPF'],['nc-tel','Telefone'],['nc-email','E-mail'],['nv-placa','Placa'],['nv-marca','Marca'],['nv-modelo','Modelo'],['nv-ano','Ano'],['nv-cor','Cor'],['nv-comb','Combustível']];
  for(var i=0;i<campos.length;i++){
    if(!document.getElementById(campos[i][0]).value.trim()){toast(campos[i][1]+' é obrigatório','error');return;}
  }
  var btn=document.getElementById('btn-salvar-cli');
  btn.textContent='Salvando...';btn.disabled=true;
  var nome=document.getElementById('nc-nome').value.trim();
  var cpf=document.getElementById('nc-cpf').value.trim();
  var tel=document.getElementById('nc-tel').value.trim();
  var email=document.getElementById('nc-email').value.trim();
  var placa=document.getElementById('nv-placa').value.toUpperCase().trim();
  sb().from('clientes').insert({nome:nome,cpf:cpf,telefone:tel,email:email,status:'novo'}).select().single().then(function(rc){
    if(rc.error){toast('Erro: '+rc.error.message,'error');btn.textContent='Cadastrar e Abrir OS';btn.disabled=false;return;}
    var cli=rc.data;
    sb().from('veiculos').insert({
      cliente_id:cli.id,placa:placa,
      marca:document.getElementById('nv-marca').value.trim(),
      modelo:document.getElementById('nv-modelo').value.trim(),
      ano:parseInt(document.getElementById('nv-ano').value)||null,
      cor:document.getElementById('nv-cor').value.trim(),
      combustivel:document.getElementById('nv-comb').value||null,
      quilometragem:parseInt(document.getElementById('nv-km').value)||null
    }).select().single().then(function(rv){
      if(rv.error){toast('Erro: '+rv.error.message,'error');btn.textContent='Cadastrar e Abrir OS';btn.disabled=false;return;}
      toast('Cliente cadastrado!');
      selecionarVeiculo(cli.id,cli.nome,tel,cpf,rv.data.id,placa,(document.getElementById('nv-marca').value+' '+document.getElementById('nv-modelo').value).trim());
    });
  });
}
function abrirAddVeiculo(cliId,cliNome){
  abrirModal('Novo Veículo — '+cliNome,
    '<div class="form-group"><label class="req">Placa</label><input type="text" id="fv-placa" placeholder="ABC-1234" style="text-transform:uppercase"></div>'+
    '<div class="form-2col"><div class="form-group"><label>Marca</label><input type="text" id="fv-marca"></div>'+
    '<div class="form-group"><label>Modelo</label><input type="text" id="fv-modelo"></div></div>'+
    '<div class="form-2col"><div class="form-group"><label>Ano</label><input type="number" id="fv-ano"></div>'+
    '<div class="form-group"><label>Cor</label><input type="text" id="fv-cor"></div></div>'+
    '<div class="form-group"><label>Combustível</label><select id="fv-comb"><option value="">—</option>'+['Gasolina','Álcool','Flex','Diesel','GNV','Elétrico','Híbrido'].map(function(c){return '<option>'+c+'</option>';}).join('')+'</select></div>',
    '<button class="btn btn-secondary btn-full" onclick="fecharModal()">Cancelar</button>'+
    '<button class="btn btn-primary btn-full" onclick="salvarAddVeiculo(\''+esc(cliId)+'\',\''+esc(cliNome)+'\')">Salvar</button>'
  );
}
function salvarAddVeiculo(cliId,cliNome){
  var placa=document.getElementById('fv-placa').value.toUpperCase().trim();
  if(!placa){toast('Placa é obrigatória','error');return;}
  sb().from('veiculos').insert({
    cliente_id:cliId,placa:placa,
    marca:document.getElementById('fv-marca').value.trim(),
    modelo:document.getElementById('fv-modelo').value.trim(),
    ano:parseInt(document.getElementById('fv-ano').value)||null,
    cor:document.getElementById('fv-cor').value.trim(),
    combustivel:document.getElementById('fv-comb').value||null
  }).select().single().then(function(rv){
    if(rv.error){toast('Erro: '+rv.error.message,'error');return;}
    toast('Veículo adicionado!');fecharModal();
    selecionarVeiculo(cliId,cliNome,'','',rv.data.id,placa,(document.getElementById('fv-marca').value+' '+document.getElementById('fv-modelo').value).trim());
  });
}

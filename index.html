<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Oficina — Mecânico</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#1a2332;--navy2:#243044;--amber:#f59e0b;--amber2:#fbbf24;--green:#10b981;--yellow:#f59e0b;--red:#ef4444;--blue:#3b82f6;--orange:#f97316;--bg:#f0f2f5;--card:#ffffff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--radius:0.85rem;--safe-bottom:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
.hidden{display:none!important}
#auth-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--navy);z-index:1000;background-image:radial-gradient(ellipse at 20% 80%,rgba(245,158,11,.2) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(59,130,246,.1) 0%,transparent 50%)}
.auth-card{width:calc(100% - 2rem);max-width:360px;background:rgba(255,255,255,.07);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.12);border-radius:1.5rem;padding:2rem}
.auth-icon{font-size:2.5rem;margin-bottom:.5rem}
.auth-title{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:#fff}
.auth-title span{color:var(--amber)}
.auth-sub{color:rgba(255,255,255,.4);font-size:.85rem;margin-top:.25rem;margin-bottom:1.75rem}
.auth-label{display:block;color:rgba(255,255,255,.6);font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem;margin-top:1rem}
.auth-input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:.7rem;padding:.85rem 1rem;color:#fff;font-size:1rem;outline:none;transition:.2s;font-family:'DM Sans',sans-serif}
.auth-input:focus{border-color:var(--amber);background:rgba(245,158,11,.1)}
.btn-login{width:100%;margin-top:1.5rem;padding:1rem;background:var(--amber);border:none;border-radius:.7rem;color:var(--navy);font-weight:700;font-size:1rem;cursor:pointer;transition:.2s;font-family:'Syne',sans-serif}
.btn-login:active{transform:scale(.98);background:var(--amber2)}
.auth-error{color:#fca5a5;font-size:.82rem;margin-top:.75rem;text-align:center;min-height:1rem}
#app{position:fixed;inset:0;display:flex;flex-direction:column}
.topbar{background:var(--navy);color:#fff;padding:.875rem 1rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;min-height:56px}
.topbar-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700}
.topbar-sub{font-size:.72rem;color:rgba(255,255,255,.5);margin-top:.1rem}
.topbar-left{display:flex;align-items:center;gap:.6rem}
.topbar-right{display:flex;align-items:center;gap:.5rem}
.btn-back{background:rgba(255,255,255,.1);border:none;color:#fff;width:36px;height:36px;border-radius:.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.btn-back:active{background:rgba(255,255,255,.2)}
.btn-icon-top{background:rgba(255,255,255,.1);border:none;color:#fff;padding:.4rem .75rem;border-radius:.5rem;cursor:pointer;font-size:.78rem;font-weight:600}
.page-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:80px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);padding-bottom:var(--safe-bottom);flex-shrink:0;z-index:100}
.nav-tab{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.6rem .25rem;cursor:pointer;transition:.15s;border:none;background:none;min-height:56px;position:relative}
.nav-tab .nav-icon{font-size:1.3rem;line-height:1}
.nav-tab .nav-label{font-size:.65rem;font-weight:600;color:var(--muted);margin-top:.2rem}
.nav-tab.active .nav-label{color:var(--amber)}
.nav-badge{position:absolute;top:6px;right:calc(50% - 20px);background:var(--red);color:#fff;border-radius:999px;font-size:.6rem;font-weight:700;padding:.1rem .35rem;min-width:1rem;text-align:center}
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border)}
.card-pad{padding:1rem}
.search-wrap{padding:1rem;background:var(--navy)}
.search-box{display:flex;align-items:center;gap:.6rem;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:.75rem;padding:.65rem .85rem}
.search-box input{flex:1;background:none;border:none;outline:none;color:#fff;font-size:1rem;font-family:'DM Sans',sans-serif}
.search-box input::placeholder{color:rgba(255,255,255,.4)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;padding:.7rem 1.2rem;border-radius:.65rem;border:none;font-size:.9rem;font-weight:600;cursor:pointer;transition:.15s;font-family:'DM Sans',sans-serif;text-decoration:none}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--amber);color:var(--navy)}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn-success{background:#d1fae5;color:#065f46}
.btn-danger{background:#fee2e2;color:var(--red)}
.btn-blue{background:#dbeafe;color:#1d4ed8}
.btn-whatsapp{background:#25d366;color:#fff}
.btn-full{width:100%}
.btn-lg{padding:.9rem 1.5rem;font-size:1rem;border-radius:.75rem}
.btn-sm{padding:.45rem .85rem;font-size:.8rem}
.badge{display:inline-block;padding:.3rem .7rem;border-radius:999px;font-size:.72rem;font-weight:700;line-height:1}
.badge-na-fila{background:#f1f5f9;color:#64748b}
.badge-manutencao{background:#dbeafe;color:#1d4ed8}
.badge-aguardando{background:#ffedd5;color:#c2410c}
.badge-pronto{background:#d1fae5;color:#065f46}
.badge-pago{background:#064e3b;color:#a7f3d0}
.badge-cancelado{background:#fee2e2;color:#b91c1c}
.badge-servico{background:#e0e7ff;color:#3730a3}
.badge-peca{background:#fef3c7;color:#92400e}
.form-group{margin-bottom:.85rem}
.form-group label{display:block;font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:.75rem .9rem;border:1.5px solid var(--border);border-radius:.65rem;font-size:1rem;font-family:'DM Sans',sans-serif;color:var(--text);background:#fff;outline:none;transition:.2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(245,158,11,.12)}
.form-group textarea{resize:vertical;min-height:80px}
.form-section{font-family:'Syne',sans-serif;font-size:.85rem;font-weight:700;color:var(--navy);margin:1.1rem 0 .6rem;padding-bottom:.35rem;border-bottom:2px solid var(--amber)}
.steps{display:flex;align-items:center;justify-content:center;gap:.25rem;padding:.75rem 1rem}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:.3s}
.step-dot.active{background:var(--amber);width:24px;border-radius:4px}
.step-dot.done{background:var(--green)}
.step-label{font-size:.72rem;color:var(--muted);text-align:center;padding:0 1rem .5rem}
.check-item{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1rem;border:1.5px solid var(--border);border-radius:.65rem;margin-bottom:.5rem;background:#fff}
.check-item.ok{border-color:var(--green);background:#f0fdf4}
.check-item.atencao{border-color:var(--yellow);background:#fffbeb}
.check-item.critico{border-color:var(--red);background:#fff1f2}
.check-label{font-size:.9rem;font-weight:600;flex:1}
.check-btns{display:flex;gap:.35rem;flex-shrink:0}
.check-btn{padding:.35rem .55rem;border-radius:.4rem;border:1.5px solid var(--border);background:#fff;font-size:.75rem;cursor:pointer;transition:.15s;font-weight:600}
.check-btn:active{transform:scale(.93)}
.check-btn.ok{background:#d1fae5;border-color:#10b981;color:#065f46}
.check-btn.atencao{background:#fef3c7;border-color:#f59e0b;color:#92400e}
.check-btn.critico{background:#fee2e2;border-color:#ef4444;color:#b91c1c}
.os-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:1rem;margin-bottom:.75rem}
.os-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.5rem}
.os-numero{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700}
.os-cliente{font-size:.95rem;font-weight:600;margin-bottom:.15rem}
.os-veiculo{font-size:.82rem;color:var(--muted)}
.os-footer{display:flex;align-items:center;justify-content:space-between;margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border)}
.os-valor{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--green)}
.os-data{font-size:.78rem;color:var(--muted)}
.result-card{background:var(--card);border-radius:var(--radius);border:2px solid var(--amber);padding:1rem;margin:1rem}
.result-name{font-size:1.1rem;font-weight:700;margin-bottom:.25rem}
.result-info{font-size:.85rem;color:var(--muted)}
.veic-option{display:flex;align-items:center;justify-content:space-between;padding:.65rem .85rem;border:1.5px solid var(--border);border-radius:.6rem;margin-bottom:.4rem;cursor:pointer;background:#fff;transition:.15s}
.veic-option:active{background:var(--bg)}
.veic-option.selected{border-color:var(--amber);background:#fffbeb}
.ponto-card{text-align:center;padding:1.5rem 1rem}
.ponto-relogio{font-family:'Syne',sans-serif;font-size:3rem;font-weight:800;color:var(--navy);letter-spacing:.05em}
.ponto-data{font-size:.85rem;color:var(--muted);margin-bottom:1.5rem}
.ponto-status{display:inline-block;padding:.4rem 1rem;border-radius:999px;font-size:.8rem;font-weight:700;margin-bottom:1.5rem}
.ponto-status.trabalhando{background:#d1fae5;color:#065f46}
.ponto-status.parado{background:#f1f5f9;color:#64748b}
.btn-ponto{width:100%;padding:1.1rem;border-radius:.85rem;border:none;font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;cursor:pointer;transition:.15s}
.btn-ponto.entrada{background:var(--green);color:#fff}
.btn-ponto.saida{background:var(--red);color:#fff}
.btn-ponto:active{transform:scale(.98)}
.ponto-row{display:flex;justify-content:space-between;align-items:center;padding:.65rem 1rem;border-bottom:1px solid var(--border);font-size:.85rem}
.produto-row{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1rem;border-bottom:1px solid var(--border)}
.produto-nome{font-weight:600;font-size:.9rem}
.produto-cat{font-size:.75rem;color:var(--muted)}
.produto-qtd{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;font-size:.9rem}
.total-row.destaque{font-size:1.1rem;font-weight:700;color:var(--green);padding-top:.75rem;border-top:2px solid var(--border);margin-top:.25rem}
#toast{position:fixed;bottom:80px;left:1rem;right:1rem;padding:.85rem 1.1rem;border-radius:.75rem;font-size:.9rem;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.2);transition:.3s;display:flex;align-items:center;gap:.6rem}
#toast.success{background:#0f172a;color:#a7f3d0;border-left:4px solid var(--green)}
#toast.error{background:#0f172a;color:#fca5a5;border-left:4px solid var(--red)}
#toast.info{background:#0f172a;color:#bfdbfe;border-left:4px solid var(--blue)}
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:flex-end}
.modal-sheet{background:var(--card);border-radius:1.25rem 1.25rem 0 0;width:100%;max-height:90vh;overflow-y:auto;padding-bottom:calc(1.5rem + var(--safe-bottom))}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:.75rem auto .25rem}
.modal-header{padding:.75rem 1.25rem 0;display:flex;align-items:flex-start;justify-content:space-between}
.modal-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700}
.modal-close{background:none;border:none;font-size:1.3rem;color:var(--muted);cursor:pointer;padding:.25rem}
.modal-body{padding:1rem 1.25rem}
.modal-footer{padding:.75rem 1.25rem 0;display:flex;flex-direction:column;gap:.5rem}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-icon{font-size:3rem;margin-bottom:.75rem}
.empty-msg{font-size:.9rem}
.alert{padding:.85rem 1rem;border-radius:.65rem;font-size:.85rem;margin:.75rem 0}
.alert-warning{background:#fef3c7;color:#92400e;border-left:4px solid var(--yellow)}
.alert-success{background:#d1fae5;color:#065f46;border-left:4px solid var(--green)}
.alert-danger{background:#fee2e2;color:#b91c1c;border-left:4px solid var(--red)}
#offline-bar{display:none;position:fixed;top:0;left:0;right:0;z-index:999;background:var(--red);color:#fff;text-align:center;padding:.5rem;font-size:.8rem;font-weight:600}
</style>
</head>
<body>
<div id="offline-bar">📵 Sem conexão</div>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-icon">🔧</div>
    <div class="auth-title">Oficina <span>Mecânico</span></div>
    <div class="auth-sub">Acesso para equipe</div>
    <label class="auth-label">E-mail</label>
    <input class="auth-input" type="email" id="auth-email" placeholder="seu@email.com" autocomplete="email" inputmode="email">
    <label class="auth-label">Senha</label>
    <input class="auth-input" type="password" id="auth-pass" placeholder="••••••••" autocomplete="current-password">
    <button class="btn-login" id="btn-login" onclick="doLogin()">Entrar</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="topbar" id="topbar">
    <div class="topbar-left">
      <button class="btn-back hidden" id="btn-back" onclick="voltar()">←</button>
      <div>
        <div class="topbar-title" id="topbar-title">🔧 Oficina</div>
        <div class="topbar-sub" id="topbar-sub">Painel do Mecânico</div>
      </div>
    </div>
    <div class="topbar-right" id="topbar-right">
      <button class="btn-icon-top" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div class="page-scroll" id="page-content"></div>
  <nav class="bottom-nav">
    <button class="nav-tab active" data-tab="buscar" onclick="App.navigate('buscar')">
      <span class="nav-icon">🔍</span><span class="nav-label">Buscar</span>
    </button>
    <button class="nav-tab" data-tab="minhas-os" onclick="App.navigate('minhas-os')">
      <span class="nav-icon">📋</span><span class="nav-label">Minhas OS</span>
      <span class="nav-badge hidden" id="badge-os">0</span>
    </button>
    <button class="nav-tab" data-tab="estoque" onclick="App.navigate('estoque')">
      <span class="nav-icon">📦</span><span class="nav-label">Estoque</span>
    </button>
    <button class="nav-tab" data-tab="ponto" onclick="App.navigate('ponto')">
      <span class="nav-icon">⏱️</span><span class="nav-label">Ponto</span>
    </button>
  </nav>
</div>

<div id="modal-overlay" class="hidden" onclick="closeModalOutside(event)">
  <div class="modal-sheet" id="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Modal</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div id="toast" class="hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const SUPABASE_URL='https://phmtiulbrlnwjllcrjcf.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBobXRpdWxicmxud2psbGNyamNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjgwODksImV4cCI6MjA5MDU0NDA4OX0.vsM7EZckDErY4rGLM-BTfmthW4ern9sT1TnIN6FT4ss';
let _sb=null;
function getSB(){if(!_sb)_sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);return _sb;}
const brl=v=>'R$\u00a0'+Math.abs(Number(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2});
const isoHoje=()=>new Date().toISOString().substring(0,10);
const brData=iso=>{if(!iso)return'—';const p=iso.substring(0,10).split('-');return`${p[2]}/${p[1]}/${p[0]}`};
const maskCPF=v=>v.replace(/\D/g,'').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2');
const maskPhone=v=>v.replace(/\D/g,'').replace(/(\d{2})(\d)/,'($1) $2').replace(/(\d{5})(\d)/,'$1-$2');
function gerarNumeroOS(){const n=new Date();const ym=n.getFullYear().toString()+(n.getMonth()+1).toString().padStart(2,'0');return`${ym}-${Math.floor(Math.random()*9000)+1000}`;}
const statusLabel={'na_fila':'Na Fila','em_manutencao':'Em Manutenção','aguardando_peca':'Aguard. Peça','pronto_retirada':'Pronto p/ Retirada','pago':'Pago','cancelado':'Cancelado'};
const statusBadge=s=>{const m={'na_fila':'badge-na-fila','em_manutencao':'badge-manutencao','aguardando_peca':'badge-aguardando','pronto_retirada':'badge-pronto','pago':'badge-pago','cancelado':'badge-cancelado'};return`<span class="badge ${m[s]||''}">${statusLabel[s]||s}</span>`;};
let _toastTimer;
function toast(msg,tipo='success',dur=3000){const el=document.getElementById('toast');el.innerHTML=`${tipo==='success'?'✅':tipo==='error'?'❌':'ℹ️'} ${msg}`;el.className=`toast ${tipo}`;el.classList.remove('hidden');clearTimeout(_toastTimer);_toastTimer=setTimeout(()=>el.classList.add('hidden'),dur);}
function openModal(titulo,body='',footer=''){document.getElementById('modal-title').textContent=titulo;document.getElementById('modal-body').innerHTML=body;document.getElementById('modal-footer').innerHTML=footer;document.getElementById('modal-overlay').classList.remove('hidden');}
function closeModal(){document.getElementById('modal-overlay').classList.add('hidden');}
function closeModalOutside(e){if(e.target.id==='modal-overlay')closeModal();}
let _currentUser=null,_funcId=null;
async function doLogin(){
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-pass').value;
  const errEl=document.getElementById('auth-error');
  const btn=document.getElementById('btn-login');
  if(!email||!pass){errEl.textContent='Preencha e-mail e senha';return;}
  btn.textContent='Entrando...';btn.disabled=true;
  const{error}=await getSB().auth.signInWithPassword({email,password:pass});
  btn.textContent='Entrar';btn.disabled=false;
  if(error){errEl.textContent='E-mail ou senha incorretos';return;}
  errEl.textContent='';
}
async function doLogout(){await getSB().auth.signOut();}
getSB().auth.onAuthStateChange(async(event,session)=>{
  const authEl=document.getElementById('auth-screen');
  const appEl=document.getElementById('app');
  if(session){
    _currentUser=session.user;
    authEl.classList.add('hidden');appEl.classList.remove('hidden');
    const{data:func}=await getSB().from('funcionarios').select('id,nome').eq('email',session.user.email).single();
    _funcId=func?.id||null;
    await App.init();
  }else{_currentUser=null;_funcId=null;authEl.classList.remove('hidden');appEl.classList.add('hidden');}
});

// ACESSO TEMPORÁRIO ABERTO — iniciar sem login
(async()=>{
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  await App.init();
})();
window.addEventListener('online',()=>document.getElementById('offline-bar').style.display='none');
window.addEventListener('offline',()=>document.getElementById('offline-bar').style.display='block');
let _clockInterval;
function startClock(){clearInterval(_clockInterval);_clockInterval=setInterval(()=>{const el=document.getElementById('relogio-live');if(el)el.textContent=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});},1000);}
let _osState={clienteId:null,clienteNome:'',clienteTel:'',veiculoId:null,veiculoPlaca:'',veiculoModelo:'',kmEntrada:'',previsao:'',descricao:'',checklist:{},itens:[],desconto:0};
function resetOS(){_osState={clienteId:null,clienteNome:'',clienteTel:'',veiculoId:null,veiculoPlaca:'',veiculoModelo:'',kmEntrada:'',previsao:'',descricao:'',checklist:{},itens:[],desconto:0};}
const App={
  current:'buscar',_params:{},
  navigate(page,params={}){
    this.current=page;this._params=params;
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===page));
    const back=['nova-os','detalhe-os','cadastro-cliente','nova-os-step2','nova-os-step3','nova-os-step4'].includes(page);
    document.getElementById('btn-back').classList.toggle('hidden',!back);
    const el=document.getElementById('page-content');el.scrollTop=0;

function toggleSaida(id,nome){const btn=document.getElementById('csb-'+id);const card=document.getElementById('cs-'+id);if(window._checkSaida[nome]){delete window._checkSaida[nome];btn.textContent='☐ Pendente';btn.style.background='#fff';btn.style.borderColor='var(--border)';btn.style.color='inherit';card.style.borderColor='var(--border)';card.style.background='#fff';}else{window._checkSaida[nome]=true;btn.textContent='✅ OK';btn.style.background='#d1fae5';btn.style.borderColor='#10b981';btn.style.color='#065f46';card.style.borderColor='#10b981';card.style.background='#f0fdf4';}}

async function fecharOS(osId,valorOriginal){
  const formaPag=document.getElementById('forma-pag').value;
  const descExtra=parseFloat(document.getElementById('desc-extra').value)||0;
  const valorFinal=Math.max(0,Number(valorOriginal)-descExtra);
  const sb=getSB();
  const{data:os,error}=await sb.from('ordens_servico').update({status:'pago',forma_pagamento:formaPag,data_pagamento:new Date().toISOString(),valor_total:valorFinal}).eq('id',osId).select().single();
  if(error){toast('Erro: '+error.message,'error');return;}
  await sb.from('financeiro_entradas').insert({os_id:osId,descricao:`OS ${os?.numero||osId}`,valor:valorFinal,forma_pagamento:formaPag,data_recebimento:isoHoje(),status:'recebido',categoria:'Serviço'});
  const{data:pecas}=await sb.from('os_itens').select('*').eq('os_id',osId).eq('tipo','peca');
  for(const it of(pecas||[])){const{data:prod}=await sb.from('estoque').select('id,quantidade').ilike('nome','%'+it.descricao+'%').limit(1).single();if(prod)await sb.from('estoque').update({quantidade:Math.max(0,Number(prod.quantidade)-Number(it.quantidade))}).eq('id',prod.id);}
  toast('OS fechada e pagamento registrado!','success');await atualizarBadgeOS();renderDetalhOS(document.getElementById('page-content'),osId);
}

async function confirmarAvaliacao(osId,nota){const comentario=document.getElementById('av-comentario').value.trim();await getSB().from('ordens_servico').update({avaliacao:nota,comentario_avaliacao:comentario}).eq('id',osId);toast('Avaliação enviada! Obrigado 🙏','success');closeModal();renderDetalhOS(document.getElementById('page-content'),osId);}

async function gerarReciboPDF(osId){
  const sb=getSB();const[{data:os},{data:itens}]=await Promise.all([sb.from('ordens_servico').select('*,clientes(*),veiculos(*)').eq('id',osId).single(),sb.from('os_itens').select('*').eq('os_id',osId)]);
  if(!os)return;const{jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'a4'});
  doc.setFontSize(18);doc.setFont('helvetica','bold');doc.text('RECIBO DE SERVIÇO',105,20,{align:'center'});
  doc.setFontSize(10);doc.setFont('helvetica','normal');
  doc.text(`OS: ${os.numero}`,20,35);doc.text(`Data: ${brData(os.data_pagamento||os.created_at)}`,20,42);
  doc.text(`Cliente: ${os.clientes?.nome||''}`,20,52);doc.text(`Telefone: ${os.clientes?.telefone||'—'}`,20,58);
  doc.text(`Veículo: ${os.veiculos?.placa||''} ${os.veiculos?.marca||''} ${os.veiculos?.modelo||''} ${os.veiculos?.ano||''}`,20,66);
  let y=80;doc.setFont('helvetica','bold');doc.text('SERVIÇOS E PEÇAS:',20,y);y+=8;doc.setFont('helvetica','normal');
  (itens||[]).forEach(it=>{doc.text(`${it.tipo==='servico'?'[S]':'[P]'} ${it.descricao}`,20,y);doc.text(`${it.quantidade}x ${brl(it.valor_unitario)} = ${brl(it.valor_total)}`,150,y,{align:'right'});y+=7;if(y>270){doc.addPage();y=20;}});
  y+=5;doc.setFont('helvetica','bold');if(os.desconto>0){doc.text(`Desconto: -${brl(os.desconto)}`,150,y,{align:'right'});y+=7;}
  doc.setFontSize(12);doc.text(`TOTAL: ${brl(os.valor_total)}`,150,y,{align:'right'});y+=8;
  doc.setFontSize(10);doc.setFont('helvetica','normal');doc.text(`Forma de pagamento: ${os.forma_pagamento||'—'}`,20,y);
  doc.save(`recibo-${os.numero}.pdf`);toast('PDF gerado!','success');
}

async function renderEstoque(el){
  document.getElementById('topbar-title').textContent='Estoque';document.getElementById('topbar-sub').textContent='Peças e produtos';

async function carregarEstoque(){
  const{data:lista}=await getSB().from('estoque').select('id,nome,categoria,quantidade,quantidade_minima,unidade').order('nome');
  const el=document.getElementById('est-lista');if(!el)return;
  const filtrada=_estSearch?(lista||[]).filter(p=>p.nome?.toLowerCase().includes(_estSearch)||p.categoria?.toLowerCase().includes(_estSearch)):(lista||[]);
  const alertas=filtrada.filter(p=>Number(p.quantidade)<=Number(p.quantidade_minima));
  let html='';
  if(alertas.length)html+=`<div class="alert alert-danger" style="margin:.75rem">⚠️ ${alertas.length} iten(s) abaixo do mínimo</div>`;
  html+=filtrada.map(p=>{const ok=Number(p.quantidade)>Number(p.quantidade_minima);const warn=Number(p.quantidade)===Number(p.quantidade_minima);const cor=ok?'var(--green)':warn?'var(--yellow)':'var(--red)';return`<div class="produto-row"><div><div class="produto-nome">${p.nome}</div><div class="produto-cat">${p.categoria||'—'}</div></div><div style="text-align:right"><div class="produto-qtd" style="color:${cor}">${p.quantidade} ${p.unidade||'un'}</div><div style="font-size:.75rem;color:var(--muted)">mín: ${p.quantidade_minima}</div></div></div>`;}).join('');
  el.innerHTML=html||'<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-msg">Nenhum produto encontrado</div></div>';
}
function abrirEntradaEstoque(){getSB().from('estoque').select('id,nome,quantidade').order('nome').then(({data:prods})=>{openModal('📥 Entrada de Estoque',`<div class="form-group"><label>Produto *</label><select id="ee-prod">${(prods||[]).map(p=>`<option value="${p.id}">${p.nome} (atual: ${p.quantidade})</option>`).join('')}</select></div><div class="form-group"><label>Quantidade *</label><input type="number" id="ee-qtd" value="1" min="0.01" step="0.01" inputmode="decimal"></div><div class="form-group"><label>Custo Unit. R$</label><input type="number" id="ee-custo" value="0" step="0.01" inputmode="decimal"></div><div class="form-group"><label>Observação</label><input type="text" id="ee-obs" placeholder="Nota fiscal..."></div>`,`<button class="btn btn-secondary btn-full" onclick="closeModal()">Cancelar</button><button class="btn btn-primary btn-full" onclick="confirmarEntradaEstoque()">✅ Registrar Entrada</button>`);});}

let _pontoAberto=null;
async function renderPonto(el){
  document.getElementById('topbar-title').textContent='Ponto';document.getElementById('topbar-sub').textContent='Controle de horas';document.getElementById('topbar-right').innerHTML='';clearInterval(_clockInterval);
  el.innerHTML='<div style="text-align:center;padding:3rem;color:var(--muted)">⏳</div>';
  const sb=getSB();const hoje=isoHoje();const inicioMes=hoje.substring(0,7)+'-01';
  let funcId=_funcId;
  if(!funcId&&_currentUser?.email){const{data:func}=await sb.from('funcionarios').select('id,nome,valor_hora').eq('email',_currentUser.email).single();funcId=func?.id;}
  const{data:pontoHoje}=funcId?await sb.from('ponto').select('*').eq('funcionario_id',funcId).eq('data',hoje).is('saida',null).single():{data:null};
  _pontoAberto=pontoHoje?.id||null;
  const{data:func2}=funcId?await sb.from('funcionarios').select('valor_hora').eq('id',funcId).single():{data:null};
  const{data:pontosMes}=funcId?await sb.from('ponto').select('*').eq('funcionario_id',funcId).gte('data',inicioMes).order('data',{ascending:false}):{data:[]};
  const totalH=(pontosMes||[]).reduce((s,p)=>s+Number(p.horas_trabalhadas||0),0);const totalPag=totalH*Number(func2?.valor_hora||0);
  const trabalhando=!!_pontoAberto;const hrInicio=pontoHoje?.entrada?new Date(pontoHoje.entrada).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):null;
  el.innerHTML=`<div style="padding:1rem"><div class="card card-pad ponto-card"><div class="ponto-relogio" id="relogio-live">${new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</div><div class="ponto-data">${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})}</div><div class="ponto-status ${trabalhando?'trabalhando':'parado'}">${trabalhando?`🟢 Trabalhando desde ${hrInicio}`:'⚪ Fora do expediente'}</div>${funcId?`<button class="btn-ponto ${trabalhando?'saida':'entrada'}" onclick="${trabalhando?`registrarSaida('${funcId}','${_pontoAberto}')`:`registrarEntrada('${funcId}')`}">${trabalhando?'🔴 Registrar Saída':'🟢 Registrar Entrada'}</button>`:`<div class="alert alert-warning" style="margin-top:.5rem">Seu e-mail não está vinculado a um funcionário. Peça ao gestor para cadastrar.</div>`}</div><div class="card" style="margin-top:.75rem"><div style="display:grid;grid-template-columns:1fr 1fr;text-align:center;padding:.75rem;gap:.5rem"><div style="padding:.5rem;background:var(--bg);border-radius:.5rem"><div style="font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800">${totalH.toFixed(1)}h</div><div style="font-size:.72rem;color:var(--muted)">Horas no mês</div></div><div style="padding:.5rem;background:var(--bg);border-radius:.5rem"><div style="font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--green)">${brl(totalPag)}</div><div style="font-size:.72rem;color:var(--muted)">A receber</div></div></div></div><div style="margin-top:.75rem"><div style="font-family:'Syne',sans-serif;font-size:.85rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem">Histórico do Mês</div><div class="card">${(pontosMes||[]).length===0?'<div class="empty-state" style="padding:1.5rem"><div class="empty-msg">Nenhum registro este mês</div></div>':(pontosMes||[]).map(p=>{const ent=p.entrada?new Date(p.entrada).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'—';const sai=p.saida?new Date(p.saida).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'em aberto';return`<div class="ponto-row"><div><div style="font-weight:600;font-size:.88rem">${brData(p.data)}</div><div style="font-size:.78rem;color:var(--muted)">Entrada: ${ent} → Saída: ${sai}</div></div><div style="font-weight:700;font-size:.9rem;color:${Number(p.horas_extra||0)>0?'var(--amber)':'inherit'}">${Number(p.horas_trabalhadas||0).toFixed(1)}h</div></div>`;}).join('')}</div></div></div>`;
  startClock();
}
async function registrarEntrada(funcId){if(!funcId){toast('Funcionário não vinculado','error');return;}const{error}=await getSB().from('ponto').insert({funcionario_id:funcId,data:isoHoje(),entrada:new Date().toISOString()});if(error){toast('Erro: '+error.message,'error');return;}toast('Entrada registrada!','success');renderPonto(document.getElementById('page-content'));}
async function registrarSaida(funcId,pontoId){const sb=getSB();const saida=new Date();const{data:p}=await sb.from('ponto').select('entrada').eq('id',pontoId).single();let horas=0,extra=0;if(p?.entrada){horas=(saida-new Date(p.entrada))/3600000;extra=Math.max(0,horas-8);}const{error}=await sb.from('ponto').update({saida:saida.toISOString(),horas_trabalhadas:Math.max(0,horas),horas_extra:extra}).eq('id',pontoId);if(error){toast('Erro: '+error.message,'error');return;}toast(`Saída registrada! ${horas.toFixed(1)}h trabalhadas`,'success');_pontoAberto=null;renderPonto(document.getElementById('page-content'));}
</script>
</body>
</html>

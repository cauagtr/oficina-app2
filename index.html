<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Oficina — Mecânico</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:   #1a2332;
  --amber:  #f59e0b;
  --amber2: #fbbf24;
  --green:  #10b981;
  --yellow: #f59e0b;
  --red:    #ef4444;
  --blue:   #3b82f6;
  --bg:     #f0f2f5;
  --card:   #ffffff;
  --border: #e2e8f0;
  --text:   #0f172a;
  --muted:  #64748b;
  --radius: 0.85rem;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
.hidden { display: none !important; }

#auth-screen {
  position: fixed; inset: 0; display: flex;
  align-items: center; justify-content: center;
  background: var(--navy); z-index: 1000;
  background-image: radial-gradient(ellipse at 20% 80%, rgba(245,158,11,.2) 0%, transparent 50%);
}
.auth-card {
  width: calc(100% - 2rem); max-width: 360px;
  background: rgba(255,255,255,.07); backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,.12); border-radius: 1.5rem; padding: 2rem;
}
.auth-icon { font-size: 2.5rem; margin-bottom: .5rem; }
.auth-title { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; color: #fff; }
.auth-title span { color: var(--amber); }
.auth-sub { color: rgba(255,255,255,.4); font-size: .85rem; margin-top: .25rem; margin-bottom: 1.75rem; }
.auth-label { display: block; color: rgba(255,255,255,.6); font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; margin-top: 1rem; }
.auth-input { width: 100%; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); border-radius: .7rem; padding: .85rem 1rem; color: #fff; font-size: 1rem; outline: none; transition: .2s; font-family: 'DM Sans', sans-serif; }
.auth-input:focus { border-color: var(--amber); background: rgba(245,158,11,.1); }
.btn-login { width: 100%; margin-top: 1.5rem; padding: 1rem; background: var(--amber); border: none; border-radius: .7rem; color: var(--navy); font-weight: 700; font-size: 1rem; cursor: pointer; font-family: 'Syne', sans-serif; }
.btn-login:active { background: var(--amber2); transform: scale(.98); }
.auth-error { color: #fca5a5; font-size: .82rem; margin-top: .75rem; text-align: center; min-height: 1.2rem; }

#app { position: fixed; inset: 0; display: flex; flex-direction: column; }
.topbar { background: var(--navy); color: #fff; padding: .875rem 1rem; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; min-height: 56px; }
.topbar-left { display: flex; align-items: center; gap: .6rem; }
.topbar-right { display: flex; align-items: center; gap: .5rem; }
.topbar-title { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
.topbar-sub { font-size: .72rem; color: rgba(255,255,255,.5); margin-top: .1rem; }
.btn-back { background: rgba(255,255,255,.1); border: none; color: #fff; width: 36px; height: 36px; border-radius: .5rem; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.btn-icon-top { background: rgba(255,255,255,.1); border: none; color: #fff; padding: .4rem .75rem; border-radius: .5rem; cursor: pointer; font-size: .78rem; font-weight: 600; }

.page-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 80px; }

.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(3, 1fr); z-index: 100; }
.nav-tab { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: .6rem .25rem; cursor: pointer; border: none; background: none; min-height: 56px; position: relative; }
.nav-tab .nav-icon { font-size: 1.3rem; line-height: 1; }
.nav-tab .nav-label { font-size: .65rem; font-weight: 600; color: var(--muted); margin-top: .2rem; }
.nav-tab.active .nav-label { color: var(--amber); }
.nav-badge { position: absolute; top: 6px; right: calc(50% - 20px); background: var(--red); color: #fff; border-radius: 999px; font-size: .6rem; font-weight: 700; padding: .1rem .35rem; min-width: 1rem; text-align: center; }

.card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); }
.card-pad { padding: 1rem; }

.btn { display: inline-flex; align-items: center; justify-content: center; gap: .4rem; padding: .7rem 1.2rem; border-radius: .65rem; border: none; font-size: .9rem; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; text-decoration: none; }
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--amber); color: var(--navy); }
.btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
.btn-success { background: #d1fae5; color: #065f46; }
.btn-blue { background: #dbeafe; color: #1d4ed8; }
.btn-whatsapp { background: #25d366; color: #fff; }
.btn-full { width: 100%; display: flex; }
.btn-lg { padding: .9rem 1.5rem; font-size: 1rem; border-radius: .75rem; }
.btn-sm { padding: .45rem .85rem; font-size: .8rem; }

.badge { display: inline-block; padding: .3rem .7rem; border-radius: 999px; font-size: .72rem; font-weight: 700; line-height: 1; }
.b-nafila    { background: #f1f5f9; color: #64748b; }
.b-manut     { background: #dbeafe; color: #1d4ed8; }
.b-aguard    { background: #ffedd5; color: #c2410c; }
.b-pronto    { background: #d1fae5; color: #065f46; }
.b-pago      { background: #064e3b; color: #a7f3d0; }
.b-cancelado { background: #fee2e2; color: #b91c1c; }
.b-servico   { background: #e0e7ff; color: #3730a3; }
.b-peca      { background: #fef3c7; color: #92400e; }

.form-group { margin-bottom: .85rem; }
.form-group label { display: block; font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: .4rem; }
.form-group input,
.form-group select,
.form-group textarea { width: 100%; padding: .75rem .9rem; border: 1.5px solid var(--border); border-radius: .65rem; font-size: 1rem; font-family: 'DM Sans', sans-serif; color: var(--text); background: #fff; outline: none; transition: .2s; }
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus { border-color: var(--amber); box-shadow: 0 0 0 3px rgba(245,158,11,.12); }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-section { font-family: 'Syne', sans-serif; font-size: .85rem; font-weight: 700; color: var(--navy); margin: 1.1rem 0 .6rem; padding-bottom: .35rem; border-bottom: 2px solid var(--amber); }
.form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }

.steps { display: flex; align-items: center; justify-content: center; gap: .25rem; padding: .75rem 1rem; }
.step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: .3s; }
.step-dot.active { background: var(--amber); width: 24px; border-radius: 4px; }
.step-dot.done { background: var(--green); }
.step-label { font-size: .72rem; color: var(--muted); text-align: center; padding: 0 1rem .5rem; }

.check-item { display: flex; align-items: center; justify-content: space-between; padding: .85rem 1rem; border: 1.5px solid var(--border); border-radius: .65rem; margin-bottom: .5rem; background: #fff; }
.check-item.ok      { border-color: var(--green); background: #f0fdf4; }
.check-item.atencao { border-color: var(--yellow); background: #fffbeb; }
.check-item.critico { border-color: var(--red);    background: #fff1f2; }
.check-label { font-size: .9rem; font-weight: 600; flex: 1; }
.check-btns { display: flex; gap: .35rem; flex-shrink: 0; }
.check-btn { padding: .35rem .55rem; border-radius: .4rem; border: 1.5px solid var(--border); background: #fff; font-size: .75rem; cursor: pointer; font-weight: 600; }
.check-btn.ok      { background: #d1fae5; border-color: #10b981; color: #065f46; }
.check-btn.atencao { background: #fef3c7; border-color: #f59e0b; color: #92400e; }
.check-btn.critico { background: #fee2e2; border-color: #ef4444; color: #b91c1c; }

.os-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 1rem; margin-bottom: .75rem; cursor: pointer; }
.os-card:active { background: #fafafa; }
.os-num { font-family: 'Syne', sans-serif; font-size: .95rem; font-weight: 700; }
.os-footer { display: flex; align-items: center; justify-content: space-between; margin-top: .75rem; padding-top: .75rem; border-top: 1px solid var(--border); }
.os-valor { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; color: var(--green); }

.search-wrap { padding: 1rem; background: var(--navy); }
.search-box { display: flex; align-items: center; gap: .6rem; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15); border-radius: .75rem; padding: .65rem .85rem; }
.search-box input { flex: 1; background: none; border: none; outline: none; color: #fff; font-size: 1rem; font-family: 'DM Sans', sans-serif; }
.search-box input::placeholder { color: rgba(255,255,255,.4); }

.result-card { background: var(--card); border-radius: var(--radius); border: 2px solid var(--amber); padding: 1rem; margin: 1rem; }
.veic-option { display: flex; align-items: center; justify-content: space-between; padding: .65rem .85rem; border: 1.5px solid var(--border); border-radius: .6rem; margin-bottom: .4rem; cursor: pointer; background: #fff; }
.veic-option:active { background: var(--bg); }

.total-row { display: flex; justify-content: space-between; align-items: center; padding: .5rem 0; font-size: .9rem; }
.total-destaque { font-size: 1.1rem; font-weight: 700; color: var(--green); padding-top: .75rem; border-top: 2px solid var(--border); margin-top: .25rem; }

.alert { padding: .85rem 1rem; border-radius: .65rem; font-size: .85rem; margin: .75rem 0; }
.alert-warning { background: #fef3c7; color: #92400e; border-left: 4px solid var(--yellow); }
.alert-danger  { background: #fee2e2; color: #b91c1c;  border-left: 4px solid var(--red); }
.alert-success { background: #d1fae5; color: #065f46;  border-left: 4px solid var(--green); }

#toast { position: fixed; bottom: 80px; left: 1rem; right: 1rem; padding: .85rem 1.1rem; border-radius: .75rem; font-size: .9rem; font-weight: 600; z-index: 9999; box-shadow: 0 4px 20px rgba(0,0,0,.2); }
#toast.success { background: #0f172a; color: #a7f3d0; border-left: 4px solid var(--green); }
#toast.error   { background: #0f172a; color: #fca5a5; border-left: 4px solid var(--red); }
#toast.info    { background: #0f172a; color: #bfdbfe; border-left: 4px solid var(--blue); }

#modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 500; display: flex; align-items: flex-end; }
.modal-sheet { background: var(--card); border-radius: 1.25rem 1.25rem 0 0; width: 100%; max-height: 90vh; overflow-y: auto; padding-bottom: 1.5rem; }
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: .75rem auto .25rem; }
.modal-header { padding: .75rem 1.25rem 0; display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
.modal-close { background: none; border: none; font-size: 1.3rem; color: var(--muted); cursor: pointer; }
.modal-body { padding: 1rem 1.25rem; }
.modal-footer { padding: .75rem 1.25rem 0; display: flex; flex-direction: column; gap: .5rem; }

.empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); }
.empty-icon { font-size: 3rem; margin-bottom: .75rem; }

.produto-row { display: flex; align-items: center; justify-content: space-between; padding: .85rem 1rem; border-bottom: 1px solid var(--border); }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-icon">🔧</div>
    <div class="auth-title">Oficina <span>Mecânico</span></div>
    <div class="auth-sub">Acesso para equipe</div>
    <label class="auth-label">E-mail</label>
    <input class="auth-input" type="email" id="auth-email" placeholder="seu@email.com" autocomplete="email">
    <label class="auth-label">Senha</label>
    <input class="auth-input" type="password" id="auth-pass" placeholder="••••••••">
    <button class="btn-login" id="btn-login" onclick="doLogin()">Entrar</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <div class="topbar-left">
      <button class="btn-back hidden" id="btn-back" onclick="voltar()">←</button>
      <div>
        <div class="topbar-title" id="topbar-title">🔧 Oficina</div>
        <div class="topbar-sub"  id="topbar-sub">Mecânico</div>
      </div>
    </div>
    <div class="topbar-right" id="topbar-right">
      <button class="btn-icon-top" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <div class="page-scroll" id="page-content">
    <div class="empty-state"><div class="empty-icon">⏳</div></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-tab active" data-tab="buscar" onclick="App.go('buscar')">
      <span class="nav-icon">🔍</span><span class="nav-label">Buscar</span>
    </button>
    <button class="nav-tab" data-tab="minhas-os" onclick="App.go('minhas-os')">
      <span class="nav-icon">📋</span><span class="nav-label">Minhas OS</span>
      <span class="nav-badge hidden" id="badge-os">0</span>
    </button>
    <button class="nav-tab" data-tab="estoque" onclick="App.go('estoque')">
      <span class="nav-icon">📦</span><span class="nav-label">Estoque</span>
    </button>
  </nav>
</div>

<div id="modal-overlay" class="hidden" onclick="fecharModalFora(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modal-title">—</div>
      <button class="modal-close" onclick="fecharModal()">✕</button>
    </div>
    <div class="modal-body"   id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div id="toast" class="hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>

var SUPA_URL = 'https://phmtiulbrlnwjllcrjcf.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBobXRpdWxicmxud2psbGNyamNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjgwODksImV4cCI6MjA5MDU0NDA4OX0.vsM7EZckDErY4rGLM-BTfmthW4ern9sT1TnIN6FT4ss';

var _sb = null;
function sb() {
  if (!_sb) _sb = supabase.createClient(SUPA_URL, SUPA_KEY);
  return _sb;
}

function brl(v) {
  return 'R$\u00a0' + Math.abs(Number(v) || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
}
function hoje() {
  return new Date().toISOString().substring(0, 10);
}
function dataBR(iso) {
  if (!iso) return '—';
  var p = iso.substring(0, 10).split('-');
  return p[2] + '/' + p[1] + '/' + p[0];
}
function maskCPF(v) {
  return v.replace(/\D/g,'').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2');
}
function maskPhone(v) {
  return v.replace(/\D/g,'').replace(/(\d{2})(\d)/,'($1) $2').replace(/(\d{5})(\d)/,'$1-$2');
}
function numOS() {
  var n = new Date();
  var ym = n.getFullYear() + '' + (n.getMonth()+1).toString().padStart(2,'0');
  return ym + '-' + (Math.floor(Math.random()*9000)+1000);
}
function esc(s) {
  return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}

var SL = {
  'na_fila':'Na Fila','em_manutencao':'Em Manutenção',
  'aguardando_peca':'Aguard. Peça','pronto_retirada':'Pronto p/ Retirada',
  'pago':'Pago','cancelado':'Cancelado'
};
var SC = {
  'na_fila':'b-nafila','em_manutencao':'b-manut',
  'aguardando_peca':'b-aguard','pronto_retirada':'b-pronto',
  'pago':'b-pago','cancelado':'b-cancelado'
};
function badgeOS(s) {
  return '<span class="badge ' + (SC[s]||'') + '">' + (SL[s]||s) + '</span>';
}

var _tTimer;
function toast(msg, tipo) {
  tipo = tipo || 'success';
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + tipo;
  el.classList.remove('hidden');
  clearTimeout(_tTimer);
  _tTimer = setTimeout(function() { el.classList.add('hidden'); }, 3500);
}

function abrirModal(titulo, corpo, rodape) {
  document.getElementById('modal-title').textContent  = titulo  || '';
  document.getElementById('modal-body').innerHTML     = corpo   || '';
  document.getElementById('modal-footer').innerHTML   = rodape  || '';
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function fecharModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
}
function fecharModalFora(e) {
  if (e.target.id === 'modal-overlay') fecharModal();
}

var _user = null;
var _funcId = null;

function doLogin() {
  var email = document.getElementById('auth-email').value.trim();
  var pass  = document.getElementById('auth-pass').value;
  var errEl = document.getElementById('auth-error');
  var btn   = document.getElementById('btn-login');
  errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'Preencha e-mail e senha.'; return; }
  btn.textContent = 'Entrando...';
  btn.disabled = true;
  sb().auth.signInWithPassword({ email: email, password: pass }).then(function(res) {
    btn.textContent = 'Entrar';
    btn.disabled = false;
    if (res.error) errEl.textContent = 'E-mail ou senha incorretos.';
  });
}

function doLogout() {
  sb().auth.signOut();
}

sb().auth.onAuthStateChange(function(event, session) {
  if (session) {
    _user = session.user;
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    sb().from('funcionarios').select('id,nome').eq('email', session.user.email).maybeSingle().then(function(res) {
      _funcId = res.data ? res.data.id : null;
      App.init();
    });
  } else {
    _user = null; _funcId = null;
    document.getElementById('auth-screen').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
  }
});

function atualizarBadge() {
  sb().from('ordens_servico').select('id').in('status',['na_fila','em_manutencao','aguardando_peca','pronto_retirada']).then(function(res) {
    var n = res.data ? res.data.length : 0;
    var el = document.getElementById('badge-os');
    if (el) { el.textContent = n; el.classList.toggle('hidden', n === 0); }
  });
}

var App = {
  atual: 'buscar',
  _params: {},
  go: function(pag, params) {
    this.atual = pag;
    this._params = params || {};
    document.querySelectorAll('.nav-tab').forEach(function(t) {
      t.classList.toggle('active', t.dataset.tab === pag);
    });
    var comVoltar = ['nova-os','nova-os-2','nova-os-3','nova-os-4','detalhe-os','cadastro-cliente'];
    document.getElementById('btn-back').classList.toggle('hidden', comVoltar.indexOf(pag) < 0);
    var el = document.getElementById('page-content');
    el.scrollTop = 0;
    if (pag === 'buscar')            pgBuscar(el);
    else if (pag === 'minhas-os')    pgMinhasOS(el);
    else if (pag === 'estoque')      pgEstoque(el);
    else if (pag === 'detalhe-os')       pgDetalhOS(el, this._params.osId);
    else if (pag === 'nova-os')          pgNovaOS1(el);
    else if (pag === 'nova-os-2')        pgNovaOS2(el);
    else if (pag === 'nova-os-3')        pgNovaOS3(el);
    else if (pag === 'nova-os-4')        pgNovaOS4(el);
    else if (pag === 'cadastro-cliente') pgCadastroCliente(el);
  },
  init: function() {
    atualizarBadge();
    this.go('buscar');
  }
};

function voltar() {
  var mapa = {
    'nova-os':'buscar','nova-os-2':'nova-os','nova-os-3':'nova-os-2',
    'nova-os-4':'nova-os-3','detalhe-os':'minhas-os','cadastro-cliente':'buscar'
  };
  App.go(mapa[App.atual] || 'buscar');
}

function setTopbar(titulo, sub, acoes) {
  document.getElementById('topbar-title').textContent = titulo || '';
  document.getElementById('topbar-sub').textContent   = sub   || '';
  document.getElementById('topbar-right').innerHTML   = acoes ||
    '<button class="btn-icon-top" onclick="doLogout()">Sair</button>';
}

var OS = {};
function resetOS() {
  OS = {
    clienteId:'', clienteNome:'', clienteTel:'',
    veiculoId:'', veiculoPlaca:'', veiculoModelo:'',
    km:'', previsao:'', descricao:'',
    checklist:{}, itens:[], desconto:0
  };
}
resetOS();

// ── BUSCAR ────────────────────────────────────────────────
function pgBuscar(el) {
  setTopbar('🔧 Oficina', 'Buscar cliente ou veículo');
  el.innerHTML =
    '<div class="search-wrap">' +
    '  <div class="search-box">' +
    '    <span style="color:rgba(255,255,255,.5)">🔍</span>' +
    '    <input type="text" id="busca-inp" placeholder="CPF ou placa do veículo..." autocomplete="off" oninput="onBusca(this.value)">' +
    '  </div>' +
    '</div>' +
    '<div id="busca-res">' +
    '  <div class="empty-state" style="color:var(--muted)">' +
    '    <div class="empty-icon">🔍</div>' +
    '    <p style="font-size:.88rem">Digite o CPF ou placa para buscar</p>' +
    '  </div>' +
    '</div>';
}

var _bTimer;
function onBusca(q) {
  clearTimeout(_bTimer);
  if (q.length < 3) return;
  _bTimer = setTimeout(function() { executarBusca(q); }, 400);
}

function executarBusca(q) {
  var resEl = document.getElementById('busca-res');
  if (!resEl) return;
  resEl.innerHTML = '<div class="empty-state"><div class="empty-icon" style="font-size:1.5rem">⏳</div></div>';

  var qPlaca = q.replace(/[^A-Za-z0-9]/g,'').toUpperCase();
  var clean  = q.replace(/\D/g,'');

  sb().from('veiculos').select('*, clientes(*)').ilike('placa', '%' + qPlaca + '%').limit(5).then(function(rv) {
    var veiculos = rv.data || [];
    var cliente  = veiculos.length > 0 ? veiculos[0].clientes : null;

    if (cliente) {
      mostrarResultado(cliente, veiculos);
      return;
    }

    var buscaCPF = clean.length >= 3
      ? sb().from('clientes').select('*').ilike('cpf', '%' + clean + '%').limit(1)
      : Promise.resolve({ data: [] });

    buscaCPF.then(function(rc) {
      if (rc.data && rc.data.length > 0) {
        var cli = rc.data[0];
        sb().from('veiculos').select('*').eq('cliente_id', cli.id).then(function(rv2) {
          mostrarResultado(cli, rv2.data || []);
        });
      } else {
        sb().from('clientes').select('*').ilike('nome', '%' + q + '%').limit(1).then(function(rn) {
          if (rn.data && rn.data.length > 0) {
            var cli2 = rn.data[0];
            sb().from('veiculos').select('*').eq('cliente_id', cli2.id).then(function(rv3) {
              mostrarResultado(cli2, rv3.data || []);
            });
          } else {
            var resEl2 = document.getElementById('busca-res');
            if (resEl2) {
              resEl2.innerHTML =
                '<div style="padding:1rem">' +
                '<div class="empty-state"><div class="empty-icon">😕</div>' +
                '<p style="font-size:.88rem">Nenhum resultado para "' + q + '"</p></div>' +
                '<button class="btn btn-primary btn-full btn-lg" onclick="App.go(\'cadastro-cliente\')">➕ Cadastrar Novo Cliente</button>' +
                '</div>';
            }
          }
        });
      }
    });
  });
}

function mostrarResultado(cliente, veiculos) {
  var resEl = document.getElementById('busca-res');
  if (!resEl) return;
  var badgeCli = { novo:'b-nafila', vip:'b-pronto', inativo:'b-cancelado' };

  var veicsHtml = veiculos.map(function(v) {
    var cliId   = esc(cliente.id);
    var cliNome = esc(cliente.nome || '');
    var cliTel  = esc(cliente.telefone || '');
    var vId     = esc(v.id);
    var placa   = esc(v.placa || '');
    var modelo  = esc(((v.marca||'')+' '+(v.modelo||'')).trim());
    return '<div class="veic-option" onclick="selecionarVeiculo(\'' + cliId + '\',\'' + cliNome + '\',\'' + cliTel + '\',\'' + vId + '\',\'' + placa + '\',\'' + modelo + '\')">' +
      '<div><div style="font-weight:700">' + (v.placa||'') + '</div>' +
      '<div style="font-size:.8rem;color:var(--muted)">' + (v.marca||'') + ' ' + (v.modelo||'') + ' ' + (v.ano||'') + '</div></div>' +
      '<span style="color:var(--muted)">›</span></div>';
  }).join('');

  var waHtml = cliente.telefone
    ? '<a class="btn btn-whatsapp btn-full" style="margin:.25rem 1rem 1rem;width:calc(100% - 2rem)" href="https://wa.me/55' + cliente.telefone.replace(/\D/g,'') + '" target="_blank">💬 WhatsApp</a>'
    : '';

  resEl.innerHTML =
    '<div class="result-card">' +
    '<div style="display:flex;justify-content:space-between;align-items:flex-start">' +
    '<div><div style="font-weight:700;font-size:1rem">👤 ' + (cliente.nome||'') + '</div>' +
    '<div style="font-size:.82rem;color:var(--muted)">' + (cliente.cpf||'') + (cliente.telefone ? ' | '+cliente.telefone : '') + '</div></div>' +
    '<span class="badge ' + (badgeCli[cliente.status]||'b-nafila') + '">' + (cliente.status||'novo').toUpperCase() + '</span>' +
    '</div>' +
    '<div style="margin-top:.85rem">' +
    '<div style="font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:.4rem">Selecione o veículo</div>' +
    veicsHtml +
    '<button class="btn btn-secondary btn-full" style="margin-top:.5rem" onclick="abrirAddVeiculo(\'' + esc(cliente.id) + '\',\'' + esc(cliente.nome||'') + '\')">+ Adicionar Veículo</button>' +
    '</div></div>' +
    waHtml;
}

function setCheck(item, status, btn) {
  OS.checklist[item] = status;
  var id = 'ci-' + item.replace(/[\s\/]/g,'_');

  btns.forEach(function(b) { b.classList.remove('ok','atencao','critico'); });
  btn.classList.add(status);
}

function guardarFoto(input) {

  reader.readAsDataURL(file);

function renderItens() {
  var el = document.getElementById('itens-lista');
  if (!el) return;
  if (!OS.itens.length) {
    el.innerHTML = '<p style="text-align:center;color:var(--muted);font-size:.85rem;padding:.5rem 0 1rem">Nenhum item adicionado</p>';
    return;
  }
  el.innerHTML = OS.itens.map(function(it, i) {
    return '<div style="display:grid;grid-template-columns:1fr auto;gap:.4rem;align-items:center;padding:.6rem .75rem;border:1.5px solid var(--border);border-radius:.6rem;margin-bottom:.4rem;background:#fff">' +
      '<div>' +
      '<div style="font-size:.72rem;font-weight:700;color:var(--muted)">' + (it.tipo==='servico'?'🔧 SERVIÇO':'🔩 PEÇA') + '</div>' +
      '<div style="font-weight:600;font-size:.9rem">' + it.descricao + '</div>' +
      '<div style="font-size:.78rem;color:var(--muted)">' + it.quantidade + 'x ' + brl(it.valor_unitario) + ' = ' + brl(it.valor_total) + '</div>' +
      '</div>' +
      '<button onclick="removeItem(' + i + ')" style="background:#fee2e2;border:none;color:var(--red);width:32px;height:32px;border-radius:.4rem;cursor:pointer">✕</button>' +
      '</div>';
  }).join('');
}

function addItem(tipo) {
  abrirModal(
    'Adicionar ' + (tipo==='servico'?'Serviço':'Peça'),
    '<div class="form-group"><label>Descrição *</label>' +
    '<input type="text" id="mi-desc" placeholder="' + (tipo==='servico'?'Nome do serviço':'Nome da peça') + '"></div>' +
    '<div class="form-2col">' +
    '<div class="form-group"><label>Quantidade</label><input type="number" id="mi-qtd" value="1" min="0.01" step="0.01" inputmode="decimal"></div>' +
    '<div class="form-group"><label>Valor Unit. R$</label><input type="number" id="mi-unit" value="0" min="0" step="0.01" inputmode="decimal"></div>' +
    '</div>',
    '<button class="btn btn-secondary btn-full" onclick="fecharModal()">Cancelar</button>' +
    '<button class="btn btn-primary btn-full" onclick="confirmarItem(\'' + tipo + '\')">✅ Adicionar</button>'
  );
  setTimeout(function() { var el = document.getElementById('mi-desc'); if (el) el.focus(); }, 200);
}

function confirmarItem(tipo) {
  var desc = document.getElementById('mi-desc').value.trim();
  var qtd  = parseFloat(document.getElementById('mi-qtd').value)  || 1;
  var unit = parseFloat(document.getElementById('mi-unit').value) || 0;
  if (!desc) { toast('Preencha a descrição', 'error'); return; }
  OS.itens.push({ tipo:tipo, descricao:desc, quantidade:qtd, valor_unitario:unit, valor_total:qtd*unit });
  fecharModal(); renderItens(); calcTotal();
}

function removeItem(i) { OS.itens.splice(i, 1); renderItens(); calcTotal(); }

function calcTotal() {
  var svcs = 0, pecs = 0;
  OS.itens.forEach(function(it) { if (it.tipo==='servico') svcs+=it.valor_total; else pecs+=it.valor_total; });
  var desc = parseFloat((document.getElementById('os-desconto')||{}).value||0) || 0;
  var s = document.getElementById('sub-svc'); if(s) s.textContent = brl(svcs);
  var p = document.getElementById('sub-pec'); if(p) p.textContent = brl(pecs);
  var t = document.getElementById('total-final'); if(t) t.textContent = brl(svcs+pecs-desc);
}

  OS.desconto = parseFloat(document.getElementById('os-desconto').value) || 0;

}

function salvarOS() {
  var btn = document.getElementById('btn-salvar-os');
  if (btn) { btn.textContent = 'Salvando...'; btn.disabled = true; }
  var svcs=0, pecs=0;
  OS.itens.forEach(function(it) { if(it.tipo==='servico') svcs+=it.valor_total; else pecs+=it.valor_total; });
  var total  = svcs+pecs-(OS.desconto||0);
  var numero = numOS();

  sb().from('ordens_servico').insert({
    numero:                numero,
    cliente_id:            OS.clienteId,
    veiculo_id:            OS.veiculoId,
    descricao:             OS.descricao,
    data_previsao:         OS.previsao  || null,
    quilometragem_entrada: OS.km        || null,
    valor_servicos:        svcs,
    valor_pecas:           pecs,
    desconto:              OS.desconto  || 0,
    valor_total:           total,
    status:                'na_fila',
    checklist_inspecao:    OS.checklist,
    mecanico_id:           _funcId      || null
  }).select().single().then(function(res) {
    if (res.error) {
      toast('Erro ao criar OS: ' + res.error.message, 'error');
      if (btn) { btn.textContent = '✅ Abrir Ordem de Serviço'; btn.disabled = false; }
      return;
    }
    var osData = res.data;
    var itensInsert = OS.itens.map(function(it) {
      return { os_id:osData.id, tipo:it.tipo, descricao:it.descricao, quantidade:it.quantidade, valor_unitario:it.valor_unitario, valor_total:it.valor_total };
    });
    var pInsert = itensInsert.length > 0 ? sb().from('os_itens').insert(itensInsert) : Promise.resolve({});
    pInsert.then(function() {
      sb().from('clientes').select('total_gasto').eq('id', OS.clienteId).single().then(function(rc) {
        var antigo = rc.data ? Number(rc.data.total_gasto)||0 : 0;
        sb().from('clientes').update({ ultima_visita: hoje(), total_gasto: antigo + total }).eq('id', OS.clienteId).then(function() {
          atualizarBadge();
          toast('OS ' + numero + ' aberta!');
          resetOS();
          App.go('detalhe-os', { osId: osData.id });
        });
      });
    });
  });
}

        '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.4rem">' +
        '<div><div class="os-num">' + o.numero + '</div>' +
        '<div style="font-size:.9rem;font-weight:600;margin-top:.1rem">' + (o.clientes?o.clientes.nome:'—') + '</div>' +
        '<div style="font-size:.8rem;color:var(--muted)">🚗 ' + (o.veiculos?o.veiculos.placa+' '+(o.veiculos.marca||'')+' '+(o.veiculos.modelo||''):'') + '</div></div>' +
        badgeOS(o.status) + '</div>' +
        '<div class="os-footer"><div class="os-valor">' + brl(o.valor_total) + '</div><div style="font-size:.78rem;color:var(--muted)">📅 ' + dataBR(o.data_entrada) + '</div></div>' +
        '</div>';
    }).join('');
  });
}

// ── DETALHE OS ─────────────────────────────────────────────
function pgDetalhOS(el, osId) {
  setTopbar('Detalhe da OS', 'Acompanhamento');
  el.innerHTML = '<div class="empty-state"><div class="empty-icon" style="font-size:1.5rem">⏳</div></div>';

  Promise.all([
    sb().from('ordens_servico').select('*,clientes(*),veiculos(*)').eq('id', osId).single(),
    sb().from('os_itens').select('*').eq('os_id', osId)
  ]).then(function(results) {
    var os    = results[0].data;
    var itens = results[1].data || [];
    if (!os) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><p>OS não encontrada</p></div>'; return; }

    var podeAvancar  = ['na_fila','em_manutencao','aguardando_peca'].indexOf(os.status) >= 0;
    var podeConcluir = ['em_manutencao','aguardando_peca'].indexOf(os.status) >= 0;
    var podePagar    = os.status === 'pronto_retirada';
    var isPago       = os.status === 'pago';

    var itensHtml = itens.map(function(it) {
      return '<div style="padding:.65rem 1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">' +
        '<div><span class="badge ' + (it.tipo==='servico'?'b-servico':'b-peca') + '">' + (it.tipo==='servico'?'🔧 Serviço':'🔩 Peça') + '</span>' +
        '<div style="font-weight:600;font-size:.9rem;margin-top:.2rem">' + it.descricao + '</div>' +
        '<div style="font-size:.75rem;color:var(--muted)">' + it.quantidade + 'x ' + brl(it.valor_unitario) + '</div></div>' +
        '<strong>' + brl(it.valor_total) + '</strong></div>';
    }).join('');

    var statusBtns = '';
    if (podeAvancar) {
      var btns = [];
      if (os.status==='na_fila') btns.push('<button style="flex:1;padding:.7rem;border-radius:.6rem;border:none;background:#dbeafe;color:#1d4ed8;font-size:.8rem;font-weight:700;cursor:pointer" onclick="mudarStatus(\'' + osId + '\',\'em_manutencao\')">🔧 Iniciar Manutenção</button>');
      if (os.status!=='aguardando_peca') btns.push('<button style="flex:1;padding:.7rem;border-radius:.6rem;border:none;background:#ffedd5;color:#c2410c;font-size:.8rem;font-weight:700;cursor:pointer" onclick="mudarStatus(\'' + osId + '\',\'aguardando_peca\')">⏳ Aguardando Peça</button>');
      if (podeConcluir) btns.push('<button style="flex:1;padding:.7rem;border-radius:.6rem;border:none;background:#d1fae5;color:#065f46;font-size:.8rem;font-weight:700;cursor:pointer" onclick="abrirChecklistSaida(\'' + osId + '\')">✅ Concluir OS</button>');
      statusBtns = '<div class="card card-pad" style="margin-bottom:.75rem"><div style="font-family:\'Syne\',sans-serif;font-weight:700;font-size:.85rem;margin-bottom:.6rem">ATUALIZAR STATUS</div><div style="display:flex;gap:.5rem;flex-wrap:wrap">' + btns.join('') + '</div></div>';
    }

    var pagamentoHtml = '';
    if (podePagar) {
      pagamentoHtml =
        '<div class="card card-pad" style="margin-bottom:.75rem;border:2px solid var(--green)">' +
        '<div style="font-family:\'Syne\',sans-serif;font-weight:700;color:var(--green);margin-bottom:.75rem">💰 FECHAR E RECEBER</div>' +
        '<div class="form-group"><label>Forma de Pagamento</label>' +
        '<select id="forma-pag"><option>PIX</option><option>Dinheiro</option><option>Cartão Débito</option><option>Cartão Crédito</option><option>Outros</option></select></div>' +
        '<div class="form-group"><label>Desconto adicional R$</label>' +
        '<input type="number" id="desc-extra" value="0" min="0" step="0.01" inputmode="decimal"></div>' +
        '<div style="font-family:\'Syne\',sans-serif;font-size:1.2rem;font-weight:800;color:var(--green);text-align:center;margin:.5rem 0">Total: ' + brl(os.valor_total) + '</div>' +
        '<button class="btn btn-success btn-full btn-lg" onclick="fecharOS(\'' + osId + '\',' + os.valor_total + ')">✅ Marcar como Pago</button>' +
        '</div>';
    }

    var pagoHtml = '';
    if (isPago) {
      var waLink = os.clientes && os.clientes.telefone
        ? 'https://wa.me/55' + os.clientes.telefone.replace(/\D/g,'') + '?text=' + encodeURIComponent('Olá ' + (os.clientes.nome||'') + '! Pagamento confirmado. OS: ' + os.numero + ' | Total: ' + brl(os.valor_total))
        : '';
      pagoHtml =
        '<div class="alert alert-success">✅ Pago em ' + dataBR(os.data_pagamento) + ' via ' + (os.forma_pagamento||'—') + '</div>' +
        (!os.avaliacao
          ? '<div class="card card-pad" style="margin-bottom:.75rem;text-align:center"><div style="font-weight:700;margin-bottom:.5rem">⭐ Como foi o serviço?</div>' +
            '<div style="display:flex;gap:.5rem;justify-content:center;margin:.5rem 0">' +
            [1,2,3,4,5].map(function(i) { return '<button style="font-size:2rem;background:none;border:none;cursor:pointer" onclick="avaliarOS(\'' + osId + '\',' + i + ')">⭐</button>'; }).join('') +
            '</div></div>'
          : '<div style="text-align:center;margin-bottom:.75rem;font-size:1.3rem">' + '⭐'.repeat(os.avaliacao) + '</div>'
        ) +
        '<button class="btn btn-primary btn-full" onclick="gerarPDF(\'' + osId + '\')">⬇️ Gerar Recibo PDF</button>' +
        (waLink ? '<a class="btn btn-whatsapp btn-full" style="margin-top:.4rem" href="' + waLink + '" target="_blank">💬 Enviar via WhatsApp</a>' : '');
    }

    var waStatus = '';
    if (!isPago && os.clientes && os.clientes.telefone) {
      var waMsg = encodeURIComponent('Olá ' + (os.clientes.nome||'') + '! Atualização da OS ' + os.numero + ': ' + (SL[os.status]||os.status));
      waStatus = '<a class="btn btn-whatsapp btn-full" style="margin-bottom:.5rem" href="https://wa.me/55' + os.clientes.telefone.replace(/\D/g,'') + '?text=' + waMsg + '" target="_blank">💬 Atualizar via WhatsApp</a>';
    }

    el.innerHTML =
      '<div style="padding:1rem">' +
      '<div class="card card-pad" style="margin-bottom:.75rem;border-left:4px solid var(--amber)">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start">' +
      '<div><div style="font-family:\'Syne\',sans-serif;font-size:1.1rem;font-weight:800">' + os.numero + '</div>' +
      '<div style="font-size:1rem;font-weight:600;margin-top:.1rem">' + (os.clientes?os.clientes.nome:'—') + '</div>' +
      '<div style="font-size:.82rem;color:var(--muted)">🚗 ' + (os.veiculos?os.veiculos.placa+' '+(os.veiculos.marca||'')+' '+(os.veiculos.modelo||''):'') + '</div>' +
      '</div>' + badgeOS(os.status) + '</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.75rem;font-size:.82rem">' +
      '<div><span style="color:var(--muted)">Entrada: </span>' + dataBR(os.data_entrada) + '</div>' +
      '<div><span style="color:var(--muted)">Previsão: </span>' + dataBR(os.data_previsao) + '</div>' +
      '<div><span style="color:var(--muted)">KM: </span>' + (os.quilometragem_entrada||'—') + '</div>' +
      '<div><span style="color:var(--muted)">Total: </span><strong style="color:var(--green)">' + brl(os.valor_total) + '</strong></div>' +
      '</div></div>' +
      (os.descricao ? '<div class="alert alert-warning">📝 ' + os.descricao + '</div>' : '') +
      '<div class="card" style="margin-bottom:.75rem">' +
      '<div style="padding:.75rem 1rem;border-bottom:1px solid var(--border);font-family:\'Syne\',sans-serif;font-weight:700;font-size:.9rem">Serviços e Peças</div>' +
      itensHtml +
      '<div style="padding:.75rem 1rem;text-align:right">' +
      (os.desconto > 0 ? '<div style="font-size:.85rem;color:var(--muted)">Desconto: -' + brl(os.desconto) + '</div>' : '') +
      '<div style="font-family:\'Syne\',sans-serif;font-size:1.1rem;font-weight:800;color:var(--green)">Total: ' + brl(os.valor_total) + '</div>' +
      '</div></div>' +
      statusBtns + pagamentoHtml + pagoHtml + waStatus +
      '</div>';
  });
}

function mudarStatus(osId, novoStatus) {
  sb().from('ordens_servico').update({status: novoStatus}).eq('id', osId).then(function(res) {
    if (res.error) { toast('Erro: ' + res.error.message, 'error'); return; }
    toast('Status: ' + (SL[novoStatus]||novoStatus));
    atualizarBadge();
    pgDetalhOS(document.getElementById('page-content'), osId);
  });
}

function abrirChecklistSaida(osId) {
  var itens = ['Motor ligado OK','Freios OK','Luzes OK','Serviço concluído OK','Limpeza do veículo','Documentos devolvidos'];
  window._csOk = {};
  var html = '<div style="font-size:.85rem;color:var(--muted);margin-bottom:1rem">Confirme todos os itens antes de concluir.</div>';
  html += itens.map(function(it) {
    var id = it.replace(/\s/g,'_');
    return '<div style="display:flex;align-items:center;justify-content:space-between;padding:.75rem;border:1.5px solid var(--border);border-radius:.6rem;margin-bottom:.4rem" id="cs-' + id + '">' +
      '<span style="font-weight:600;font-size:.9rem">' + it + '</span>' +
      '<button onclick="toggleCS(\'' + id + '\',\'' + it + '\')" id="csb-' + id + '" style="padding:.4rem .75rem;border:1.5px solid var(--border);border-radius:.5rem;background:#fff;cursor:pointer;font-size:.82rem;font-weight:600">☐ Pendente</button>' +
      '</div>';
  }).join('');
  abrirModal('✅ Checklist de Saída', html,
    '<button class="btn btn-secondary btn-full" onclick="fecharModal()">Cancelar</button>' +
    '<button class="btn btn-success btn-full" onclick="confirmarConclusao(\'' + osId + '\')">✅ Confirmar Conclusão</button>'
  );
}

function toggleCS(id, nome) {
  var btn  = document.getElementById('csb-' + id);
  var card = document.getElementById('cs-' + id);
  if (window._csOk[nome]) {
    delete window._csOk[nome];
    btn.textContent='☐ Pendente'; btn.style.background='#fff'; btn.style.borderColor='var(--border)'; btn.style.color='inherit';
    card.style.borderColor='var(--border)'; card.style.background='#fff';
  } else {
    window._csOk[nome]=true;
    btn.textContent='✅ OK'; btn.style.background='#d1fae5'; btn.style.borderColor='#10b981'; btn.style.color='#065f46';
    card.style.borderColor='#10b981'; card.style.background='#f0fdf4';
  }
}

function confirmarConclusao(osId) {
  var itens = ['Motor ligado OK','Freios OK','Luzes OK','Serviço concluído OK','Limpeza do veículo','Documentos devolvidos'];
  var pend = itens.filter(function(i) { return !window._csOk[i]; });
  if (pend.length > 0) { toast('Confirme todos os itens (' + pend.length + ' pendentes)', 'error'); return; }
  sb().from('ordens_servico').update({status:'pronto_retirada',checklist_saida:window._csOk,data_conclusao:new Date().toISOString()}).eq('id', osId).then(function(res) {
    if (res.error) { toast('Erro: ' + res.error.message, 'error'); return; }
    toast('OS pronta para retirada!');
    fecharModal();
    atualizarBadge();
    pgDetalhOS(document.getElementById('page-content'), osId);
  });
}

function fecharOS(osId, valorOriginal) {
  var formaPag  = document.getElementById('forma-pag').value;
  var descExtra = parseFloat(document.getElementById('desc-extra').value) || 0;
  var valorFinal = Math.max(0, Number(valorOriginal) - descExtra);

  sb().from('ordens_servico').update({status:'pago',forma_pagamento:formaPag,data_pagamento:new Date().toISOString(),valor_total:valorFinal}).eq('id', osId).select().single().then(function(res) {
    if (res.error) { toast('Erro: ' + res.error.message, 'error'); return; }
    var osAtualizada = res.data;
    sb().from('financeiro_entradas').insert({os_id:osId,descricao:'OS '+(osAtualizada?osAtualizada.numero:osId),valor:valorFinal,forma_pagamento:formaPag,data_recebimento:hoje(),status:'recebido',categoria:'Serviço'}).then(function() {
      sb().from('os_itens').select('*').eq('os_id', osId).eq('tipo','peca').then(function(rp) {
        var pecas = rp.data || [];
        var promises = pecas.map(function(it) {
          return sb().from('estoque').select('id,quantidade').ilike('nome','%'+it.descricao+'%').limit(1).single().then(function(rpr) {
            if (rpr.data) return sb().from('estoque').update({quantidade:Math.max(0,Number(rpr.data.quantidade)-Number(it.quantidade))}).eq('id',rpr.data.id);
          });
        });
        Promise.all(promises).then(function() {
          toast('OS fechada e pagamento registrado!');
          atualizarBadge();
          pgDetalhOS(document.getElementById('page-content'), osId);
        });
      });
    });
  });
}

function avaliarOS(osId, nota) {
  abrirModal('Avaliação do Serviço',
    '<div style="text-align:center;font-size:2rem;margin-bottom:.75rem">' + '⭐'.repeat(nota) + '</div>' +
    '<div class="form-group"><label>Comentário (opcional)</label><textarea id="av-coment" placeholder="Como foi o atendimento?"></textarea></div>',
    '<button class="btn btn-secondary btn-full" onclick="fecharModal()">Pular</button>' +
    '<button class="btn btn-primary btn-full" onclick="confirmarAvaliacao(\'' + osId + '\',' + nota + ')">Enviar</button>'
  );
}

function confirmarAvaliacao(osId, nota) {
  var coment = document.getElementById('av-coment') ? document.getElementById('av-coment').value.trim() : '';
  sb().from('ordens_servico').update({avaliacao:nota,comentario_avaliacao:coment}).eq('id', osId).then(function() {
    toast('Avaliação enviada! Obrigado 🙏');
    fecharModal();
    pgDetalhOS(document.getElementById('page-content'), osId);
  });
}

function gerarPDF(osId) {
  Promise.all([
    sb().from('ordens_servico').select('*,clientes(*),veiculos(*)').eq('id', osId).single(),
    sb().from('os_itens').select('*').eq('os_id', osId)
  ]).then(function(results) {
    var os    = results[0].data; if (!os) return;
    var itens = results[1].data || [];
    var doc   = new window.jspdf.jsPDF({unit:'mm',format:'a4'});
    doc.setFontSize(18); doc.setFont('helvetica','bold');
    doc.text('RECIBO DE SERVIÇO', 105, 20, {align:'center'});
    doc.setFontSize(10); doc.setFont('helvetica','normal');
    doc.text('OS: ' + os.numero, 20, 35);
    doc.text('Data: ' + dataBR(os.data_pagamento||os.created_at), 20, 42);
    doc.text('Cliente: ' + (os.clientes?os.clientes.nome:''), 20, 52);
    doc.text('Veículo: ' + (os.veiculos?os.veiculos.placa+' '+(os.veiculos.marca||'')+' '+(os.veiculos.modelo||''):''), 20, 60);
    var y = 75;
    doc.setFont('helvetica','bold'); doc.text('ITENS:', 20, y); y+=8; doc.setFont('helvetica','normal');
    itens.forEach(function(it) {
      doc.text((it.tipo==='servico'?'[S] ':'[P] ')+it.descricao, 20, y);
      doc.text(it.quantidade+'x '+brl(it.valor_unitario)+' = '+brl(it.valor_total), 150, y, {align:'right'});
      y+=7; if(y>270){doc.addPage();y=20;}
    });
    y+=5; doc.setFont('helvetica','bold');
    doc.text('TOTAL: '+brl(os.valor_total), 150, y, {align:'right'}); y+=8;
    doc.setFont('helvetica','normal');
    doc.text('Pagamento: '+(os.forma_pagamento||'—'), 20, y);
    doc.save('recibo-'+os.numero+'.pdf');
    toast('PDF gerado!');
  });
}

// ── ESTOQUE ────────────────────────────────────────────────
var _estSearch = '';

function pgEstoque(el) {
  setTopbar('Estoque', 'Peças e produtos',
    '<button class="btn-icon-top" onclick="doLogout()">Sair</button>' +
    '<button class="btn-icon-top" onclick="abrirEntradaEstoque()">📥 Entrada</button>'
  );
  el.innerHTML =
    '<div style="padding:.75rem 1rem">' +
    '<div style="display:flex;align-items:center;gap:.6rem;background:#fff;border:1.5px solid var(--border);border-radius:.75rem;padding:.65rem .85rem">' +
    '<span style="color:var(--muted)">🔍</span>' +
    '<input type="text" placeholder="Buscar produto..." style="flex:1;background:none;border:none;outline:none;font-size:.95rem;font-family:\'DM Sans\',sans-serif;color:var(--text)"' +
    ' oninput="_estSearch=this.value.toLowerCase();carregarEstoque()">' +
    '</div></div>' +
    '<div id="est-lista" style="background:#fff;border-top:1px solid var(--border)">' +
    '<div class="empty-state"><div class="empty-icon" style="font-size:1.5rem">⏳</div></div>' +
    '</div>';
  carregarEstoque();
}

function carregarEstoque() {
  sb().from('estoque').select('id,nome,categoria,quantidade,quantidade_minima,unidade').order('nome').then(function(res) {
    var lista = res.data || [];
    var el = document.getElementById('est-lista');
    if (!el) return;
    var filtrada = _estSearch
      ? lista.filter(function(p) { return (p.nome||'').toLowerCase().includes(_estSearch)||(p.categoria||'').toLowerCase().includes(_estSearch); })
      : lista;
    var alertas = filtrada.filter(function(p) { return Number(p.quantidade) <= Number(p.quantidade_minima); });
    var html = '';
    if (alertas.length) html += '<div class="alert alert-danger" style="margin:.75rem">⚠️ '+alertas.length+' iten(s) abaixo do mínimo</div>';
    if (!filtrada.length) {
      html += '<div class="empty-state"><div class="empty-icon">📦</div><p style="font-size:.88rem">Nenhum produto</p></div>';
    } else {
      html += filtrada.map(function(p) {
        var ok   = Number(p.quantidade) > Number(p.quantidade_minima);
        var warn = Number(p.quantidade) === Number(p.quantidade_minima);
        var cor  = ok?'var(--green)':warn?'var(--yellow)':'var(--red)';
        return '<div class="produto-row">' +
          '<div><div style="font-weight:600;font-size:.9rem">'+p.nome+'</div><div style="font-size:.75rem;color:var(--muted)">'+(p.categoria||'—')+'</div></div>' +
          '<div style="text-align:right"><div style="font-family:\'Syne\',sans-serif;font-size:1rem;font-weight:700;color:'+cor+'">'+p.quantidade+' '+(p.unidade||'un')+'</div><div style="font-size:.72rem;color:var(--muted)">mín: '+p.quantidade_minima+'</div></div>' +
          '</div>';
      }).join('');
    }
    el.innerHTML = html;
  });
}

function abrirEntradaEstoque() {
  sb().from('estoque').select('id,nome,quantidade').order('nome').then(function(res) {
    var prods = res.data || [];
    abrirModal('📥 Entrada de Estoque',
      '<div class="form-group"><label>Produto *</label>' +
      '<select id="ee-prod">' + prods.map(function(p){return '<option value="'+p.id+'">'+p.nome+' (atual: '+p.quantidade+')</option>';}).join('') + '</select></div>' +
      '<div class="form-group"><label>Quantidade *</label><input type="number" id="ee-qtd" value="1" min="0.01" step="0.01" inputmode="decimal"></div>' +
      '<div class="form-group"><label>Custo Unit. R$</label><input type="number" id="ee-custo" value="0" step="0.01" inputmode="decimal"></div>' +
      '<div class="form-group"><label>Observação</label><input type="text" id="ee-obs" placeholder="Nota fiscal..."></div>',
      '<button class="btn btn-secondary btn-full" onclick="fecharModal()">Cancelar</button>' +
      '<button class="btn btn-primary btn-full" onclick="confirmarEntrada()">✅ Registrar Entrada</button>'
    );
  });
}

function confirmarEntrada() {
  var prodId = document.getElementById('ee-prod').value;
  var qtd    = parseFloat(document.getElementById('ee-qtd').value)   || 0;
  var custo  = parseFloat(document.getElementById('ee-custo').value) || 0;
  var obs    = document.getElementById('ee-obs').value;
  if (!prodId || qtd <= 0) { toast('Selecione produto e informe a quantidade','error'); return; }
  sb().from('estoque').select('quantidade').eq('id', prodId).single().then(function(res) {
    var nova = (Number(res.data?res.data.quantidade:0)||0) + qtd;
    Promise.all([
      sb().from('estoque').update({quantidade:nova}).eq('id', prodId),
      sb().from('estoque_movimentos').insert({produto_id:prodId,tipo:'entrada',quantidade:qtd,valor_unitario:custo,observacoes:obs})
    ]).then(function() {
      toast('Entrada registrada! Total: '+nova);
      fecharModal();
      carregarEstoque();
    });
  });
}

    '<div class="form-group"><label>E-mail</label><input type="email" id="nc-email"></div>' +
    '<div class="form-section">Veículo</div>' +
    '<div class="form-group"><label>Placa *</label><input type="text" id="nv-placa" placeholder="ABC-1234" style="text-transform:uppercase"></div>' +
    '<div class="form-2col">' +
    '<div class="form-group"><label>Marca</label><input type="text" id="nv-marca" placeholder="Toyota"></div>' +
    '<div class="form-group"><label>Modelo</label><input type="text" id="nv-modelo" placeholder="Corolla"></div>' +
    '</div>' +
    '<div class="form-2col">' +
    '<div class="form-group"><label>Ano</label><input type="number" id="nv-ano" inputmode="numeric"></div>' +
    '<div class="form-group"><label>Cor</label><input type="text" id="nv-cor"></div>' +
    '</div>' +
    '<div class="form-group"><label>Combustível</label><select id="nv-comb">' +
    '<option value="">—</option>' +
    ['Gasolina','Álcool','Flex','Diesel','GNV','Elétrico','Híbrido'].map(function(c){return '<option>'+c+'</option>';}).join('') +
    '</select></div>' +
    '<div class="form-group"><label>Quilometragem</label><input type="number" id="nv-km" inputmode="numeric"></div>' +
    '<button class="btn btn-primary btn-full btn-lg" id="btn-salvar-cli" onclick="salvarNovoCliente()">💾 Cadastrar e Abrir OS</button>' +
    '<div style="height:.5rem"></div>' +
    '</div>';
  document.getElementById('nc-cpf').addEventListener('input', function(){ this.value = maskCPF(this.value); });
  document.getElementById('nc-tel').addEventListener('input', function(){ this.value = maskPhone(this.value); });
}

function salvarNovoCliente() {
  var nome  = document.getElementById('nc-nome').value.trim();
  var cpf   = document.getElementById('nc-cpf').value.trim();
  var tel   = document.getElementById('nc-tel').value.trim();
  var email = document.getElementById('nc-email').value.trim();
  var placa = document.getElementById('nv-placa').value.toUpperCase().trim();
  if (!nome||!cpf||!placa) { toast('Nome, CPF e placa são obrigatórios','error'); return; }
  var btn = document.getElementById('btn-salvar-cli');
  btn.textContent='Salvando...'; btn.disabled=true;
  sb().from('clientes').insert({nome:nome,cpf:cpf,telefone:tel,email:email,status:'novo'}).select().single().then(function(rc) {
    if (rc.error) { toast('Erro: '+rc.error.message,'error'); btn.textContent='💾 Cadastrar e Abrir OS'; btn.disabled=false; return; }
    var cli = rc.data;
    sb().from('veiculos').insert({
      cliente_id:cli.id, placa:placa,
      marca:document.getElementById('nv-marca').value.trim(),
      modelo:document.getElementById('nv-modelo').value.trim(),
      ano:parseInt(document.getElementById('nv-ano').value)||null,
      cor:document.getElementById('nv-cor').value.trim(),
      combustivel:document.getElementById('nv-comb').value||null,
      quilometragem:parseInt(document.getElementById('nv-km').value)||null
    }).select().single().then(function(rv) {
      if (rv.error) { toast('Erro: '+rv.error.message,'error'); btn.textContent='💾 Cadastrar e Abrir OS'; btn.disabled=false; return; }
      toast('Cliente e veículo cadastrados!');
      selecionarVeiculo(cli.id, cli.nome, tel, rv.data.id, placa, (document.getElementById('nv-marca').value+' '+document.getElementById('nv-modelo').value).trim());
    });
  });
}

function abrirAddVeiculo(cliId, cliNome) {
  abrirModal('Novo Veículo — '+cliNome,
    '<div class="form-group"><label>Placa *</label><input type="text" id="fv-placa" placeholder="ABC-1234" style="text-transform:uppercase"></div>' +
    '<div class="form-2col">' +
    '<div class="form-group"><label>Marca</label><input type="text" id="fv-marca" placeholder="Toyota"></div>' +
    '<div class="form-group"><label>Modelo</label><input type="text" id="fv-modelo" placeholder="Corolla"></div>' +
    '</div>' +
    '<div class="form-2col">' +
    '<div class="form-group"><label>Ano</label><input type="number" id="fv-ano"></div>' +
    '<div class="form-group"><label>Cor</label><input type="text" id="fv-cor"></div>' +
    '</div>' +
    '<div class="form-group"><label>Combustível</label><select id="fv-comb"><option value="">—</option>' +
    ['Gasolina','Álcool','Flex','Diesel','GNV','Elétrico','Híbrido'].map(function(c){return '<option>'+c+'</option>';}).join('') +
    '</select></div>',
    '<button class="btn btn-secondary btn-full" onclick="fecharModal()">Cancelar</button>' +
    '<button class="btn btn-primary btn-full" onclick="salvarAddVeiculo(\'' + esc(cliId) + '\',\'' + esc(cliNome) + '\')">💾 Salvar</button>'
  );
}

function salvarAddVeiculo(cliId, cliNome) {
  var placa = document.getElementById('fv-placa').value.toUpperCase().trim();
  if (!placa) { toast('Placa obrigatória','error'); return; }
  sb().from('veiculos').insert({
    cliente_id:cliId, placa:placa,
    marca:document.getElementById('fv-marca').value.trim(),
    modelo:document.getElementById('fv-modelo').value.trim(),
    ano:parseInt(document.getElementById('fv-ano').value)||null,
    cor:document.getElementById('fv-cor').value.trim(),
    combustivel:document.getElementById('fv-comb').value||null
  }).select().single().then(function(rv) {
    if (rv.error) { toast('Erro: '+rv.error.message,'error'); return; }
    toast('Veículo adicionado!');
    fecharModal();
    selecionarVeiculo(cliId, cliNome, '', rv.data.id, placa, '');
  });
}

</script>
</body>
</html>
